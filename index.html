<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM Captação · Life Planners</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --navy:#0f172a; --navy2:#1e293b; --line:#e2e8f0; --bg:#f8fafc; --card:#fff;
  --txt:#0f172a; --muted:#64748b; --primary:#2563eb; --green:#16a34a; --red:#ef4444;
  --amber:#f59e0b; --violet:#8b5cf6; --teal:#0d9488; --emerald:#059669;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* ---------- AUTH ---------- */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e3a8a)}
.auth-card{background:#fff;border-radius:16px;padding:32px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-card h1{font-size:20px;margin-bottom:4px}
.auth-card p.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.auth-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 4px}
.auth-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px}
.auth-card button.primary{width:100%;margin-top:18px;background:var(--primary);color:#fff;padding:12px;border-radius:9px;font-weight:600}
.auth-toggle{text-align:center;margin-top:14px;font-size:13px;color:var(--muted)}
.auth-toggle a{color:var(--primary);cursor:pointer;font-weight:600}
.auth-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}

/* ---------- APP SHELL ---------- */
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--navy);color:#cbd5e1;display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;color:#fff;font-weight:700}
.brand .logo{width:30px;height:30px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:#cbd5e1;font-weight:500;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:var(--navy2);color:#fff}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item .ic{width:18px;text-align:center}
.nav-spacer{flex:1}
.nav-foot{font-size:12px;color:#64748b;padding:8px}
.nav-foot a{color:#94a3b8;cursor:pointer}
.btn-mine{background:#3730a3;color:#fff;margin-top:8px}
.btn-mine:hover{background:#4338ca}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar h2{font-size:17px;flex-shrink:0}
.search{flex:1;max-width:340px;position:relative}
.search input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:9px;background:var(--bg)}
.search:before{content:"🔍";position:absolute;left:10px;top:8px;font-size:13px;opacity:.6}
.topbar .who{font-size:13px;color:var(--muted)}
.btn{padding:9px 14px;border-radius:9px;font-weight:600}
.btn.primary{background:var(--primary);color:#fff}
.btn.ghost{background:var(--bg);border:1px solid var(--line);color:var(--txt)}
.content{padding:20px 22px;flex:1;overflow:auto}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chip{padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:500;color:var(--muted)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip.money.on{background:var(--green);border-color:var(--green)}
select.fsel{padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}

/* table */
.tablewrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:11px 12px;border-bottom:1px solid var(--line);background:#f8fafc}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row:hover{background:#f8fafc;cursor:pointer}
.lead-cell{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.lead-name{font-weight:600}
.lead-cargo{font-size:12px;color:var(--muted)}
.renda{font-weight:700;font-size:13px}
.renda.hi{color:var(--green)} .renda.lo{color:#94a3b8}
.statusbadge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;border:none;cursor:pointer;max-width:200px}
.statusbadge .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85)}
.score{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px}
.flag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;background:#fef2f2;color:var(--red);margin-left:4px}
.flag.warn{background:#fffbeb;color:var(--amber)}
.muted{color:var(--muted)}

/* funil */
.funil{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.col{background:#fff;border:1px solid var(--line);border-radius:12px;min-width:250px;width:250px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 170px)}
.col h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.col .count{background:var(--bg);color:var(--muted);border-radius:10px;padding:1px 8px;font-size:11px}
.col .cards{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}
.col.drop{outline:2px dashed var(--primary);outline-offset:-4px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.kcard:hover{border-color:var(--primary)}
.kcard.dragging{opacity:.4}
.kcard .top{display:flex;gap:8px;align-items:center}
.kcard .nm{font-weight:600;font-size:13px}
.kcard .emp{font-size:11px;color:var(--muted)}
.kcard .meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}

/* drawer */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;display:flex;justify-content:flex-end}
.drawer{width:440px;max-width:92vw;background:#fff;height:100%;overflow-y:auto;padding:22px;animation:slidein .18s ease}
@keyframes slidein{from{transform:translateX(30px);opacity:.5}to{transform:none;opacity:1}}
.drawer .dh{display:flex;gap:12px;align-items:center;margin-bottom:8px}
.drawer h2{font-size:18px}
.field{margin-top:12px}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px}
.row2{display:flex;gap:10px}.row2>div{flex:1}
.timeline{margin-top:8px;border-left:2px solid var(--line);padding-left:14px}
.tl-item{margin-bottom:12px;position:relative}
.tl-item:before{content:"";position:absolute;left:-21px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--primary)}
.tl-when{font-size:11px;color:var(--muted)}
.x{margin-left:auto;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}

/* modal */
.modal{background:#fff;border-radius:14px;width:480px;max-width:94vw;padding:24px;margin:auto}
.modal h2{font-size:18px;margin-bottom:4px}
.modal .hint{color:var(--muted);font-size:13px;margin-bottom:14px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;z-index:60;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.scard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 16px;min-width:120px}
.scard .n{font-size:22px;font-weight:800}
.scard .l{font-size:12px;color:var(--muted)}
@media(max-width:760px){
  .sidebar{position:fixed;left:-240px;z-index:50;transition:left .2s}
  .sidebar.open{left:0}
  .menu-btn{display:inline-block!important}
}
.menu-btn{display:none}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <h1>CRM Captação</h1>
    <p class="sub">Life Planners · Prudential Recife</p>
    <div id="loginForm">
      <label>E-mail</label><input id="li-email" type="email" autocomplete="username" placeholder="voce@email.com"/>
      <label>Senha</label><input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••••"/>
      <button class="primary" id="li-btn">Entrar</button>
      <div class="auth-err" id="li-err"></div>
      <div class="auth-toggle">Primeira vez? <a id="to-signup">Criar minha conta</a></div>
    </div>
    <div id="signupForm" class="hidden">
      <label>Nome</label><input id="su-name" placeholder="Seu nome (Gustavo / Victor)"/>
      <label>E-mail</label><input id="su-email" type="email" placeholder="voce@email.com"/>
      <label>Senha</label><input id="su-pass" type="password" placeholder="mínimo 6 caracteres"/>
      <button class="primary" id="su-btn">Criar conta e entrar</button>
      <div class="auth-err" id="su-err"></div>
      <div class="auth-toggle">Já tem conta? <a id="to-login">Entrar</a></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="logo">L</div> CRM Captação</div>
    <button class="nav-item active" data-view="funil"><span class="ic">▦</span> Funil</button>
    <button class="nav-item" data-view="lista"><span class="ic">☰</span> Lista</button>
    <button class="nav-item btn-mine" id="nav-mine"><span class="ic">⛏</span> Garimpo (Mineração)</button>
    <button class="nav-item" id="nav-novo"><span class="ic">＋</span> Novo lead</button>
    <button class="nav-item" id="nav-import"><span class="ic">⬆</span> Atualizar base de dados</button>
    <div class="nav-spacer"></div>
    <button class="nav-item" id="nav-update"><span class="ic">⟳</span> Atualizar versão</button>
    <div class="nav-foot">Versão <span id="ver"></span> · <span id="who-foot"></span><br/><a id="logout">Sair</a></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="btn ghost menu-btn" id="menu-btn">☰</button>
      <h2 id="view-title">Funil</h2>
      <div class="search"><input id="search" placeholder="Buscar por nome, empresa, cargo..."/></div>
      <button class="btn primary" id="top-novo">＋ Novo lead</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ===== CONFIG =====
const SB_URL = "https://kbiinfpjfmuidyzsfegp.supabase.co";
const SB_KEY = "sb_publishable_dJIyTLNxc88kS3p3cCOZYg_laSzn727";
const sb = window.supabase.createClient(SB_URL, SB_KEY);
const APP_VERSION = 'v1.2';

// ===== FUNNEL CONFIG =====
const ETAPAS = ['Qualificacao','Conexao','TA','OT','FIP','Fechamento','Dormente','Descartado'];
const ETAPA_LABEL = {Qualificacao:'Qualificação',Conexao:'Conexão',TA:'T.A.',OT:'OT',FIP:'FIP',Fechamento:'Fechamento',Dormente:'Dormente',Descartado:'Descartado'};
const STATUS_BY_ETAPA = {
  Qualificacao:['Aguardando Qualificacao','Qualificado'],
  Conexao:['A Enviar Convite','Convite Enviado','Convite Aceito (s/ telefone)','Convite Aceito (c/ telefone)','Convite Nao Aceito'],
  TA:['Em Tentativa','Nao Atendeu','TA Agendada','Retornar em outro momento'],
  OT:['OT Agendada','Confirmacao de OT','OT Realizada','Delay OT','TA Reagendar OT','Nao Compareceu'],
  FIP:['FIP Agendado','Confirmacao de FIP','FIP Realizado'],
  Fechamento:['Onboarding','Convertido'],
  Dormente:['Dormente'],
  Descartado:['Sem Perfil','Sem Interesse','Momento Ruim','Area de Seguros','Fora de Regiao','Sumiu']
};
const ETAPA_COLOR = {Qualificacao:'#f59e0b',Conexao:'#2563eb',TA:'#8b5cf6',OT:'#16a34a',FIP:'#0d9488',Fechamento:'#059669',Dormente:'#6b7280',Descartado:'#ef4444'};
const STATUS_ETAPA = {}; // reverse map
for(const e of ETAPAS){ for(const s of STATUS_BY_ETAPA[e]) STATUS_ETAPA[s]=e; }
const ALL_STATUS = ETAPAS.flatMap(e=>STATUS_BY_ETAPA[e]);
const SCORE_COLOR = {A:'#16a34a',B:'#2563eb',C:'#f59e0b',D:'#ef4444'};
const AVA_COLORS=['#2563eb','#16a34a','#8b5cf6','#0d9488','#f59e0b','#ef4444','#0ea5e9','#db2777'];

// ===== STATE =====
let LEADS=[], VIEW='funil', SEARCH='', F_ETAPA='', F_RESP='', F_MONEY=false, ME='';
let F_SITUACAO='Ativo', F_ORIGEM='', F_RECOM='';
const SITUACOES=['Ativo','Dormente','Convertido','Descartado'];
function situacaoOf(l){
  if(l.etapa==='Descartado') return 'Descartado';
  if(l.etapa==='Dormente') return 'Dormente';
  if(l.status==='Convertido') return 'Convertido';
  return 'Ativo';
}

// ===== HELPERS =====
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function initials(n){return (n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function avaColor(id){let h=0;for(const c of (id||''))h=(h*31+c.charCodeAt(0))%AVA_COLORS.length;return AVA_COLORS[h];}
function avatarHTML(l,size){
  const s=size||36;
  if(l.foto_url) return `<img class="avatar" style="width:${s}px;height:${s}px" src="${esc(l.foto_url)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar',style:'width:${s}px;height:${s}px;background:${avaColor(l.id)}',textContent:'${initials(l.nome)}'}))"/>`;
  return `<div class="avatar" style="width:${s}px;height:${s}px;background:${avaColor(l.id)}">${initials(l.nome)}</div>`;
}
function rendaHTML(l){
  if(l.renda_estimada==null) return `<span class="muted">—</span>`;
  const hi=l.renda_estimada>=10000;
  return `<span class="renda ${hi?'hi':'lo'}">${l.renda_auto?'~':''}R$ ${Number(l.renda_estimada).toLocaleString('pt-BR')}</span>`;
}
function statusBadge(l){
  const c=ETAPA_COLOR[STATUS_ETAPA[l.status]]||'#64748b';
  return `<button class="statusbadge" style="background:${c}" data-status-btn="${l.id}"><span class="dot"></span>${esc(l.status)}</button>`;
}
function flagsHTML(l){
  return (l.flags_qualidade||[]).map(f=>`<span class="flag ${f==='SEM_DDD'?'warn':''}">${esc(f)}</span>`).join('');
}
function normUrl(u){if(!u)return null;u=u.trim().toLowerCase().split('?')[0].replace(/\/overlay.*$/,'').replace(/\/details.*$/,'');if(!u.endsWith('/'))u+='/';return u;}
function normPhone(raw){if(!raw)return{telefone:null,e164:null};let d=raw.replace(/\D/g,'');if(d.startsWith('55')&&d.length>11)d=d.slice(2);if(d.length===11)return{telefone:`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`,e164:`+55${d}`};if(d.length===10)return{telefone:`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`,e164:`+55${d}`};return{telefone:raw,e164:null};}
function firstName(n){return (n||'').trim().split(' ')[0]||'';}

// ===== DATA =====
async function loadLeads(){
  const {data,error}=await sb.from('leads').select('*').order('codigo',{ascending:true});
  if(error){toast('Erro ao carregar: '+error.message);return;}
  LEADS=data||[];render();
}
async function updateLead(id,patch){
  const {error}=await sb.from('leads').update(patch).eq('id',id);
  if(error){toast('Erro: '+error.message);return false;}
  const i=LEADS.findIndex(l=>l.id===id);
  if(i>=0){Object.assign(LEADS[i],patch); if(patch.status) LEADS[i].etapa=STATUS_ETAPA[patch.status];}
  return true;
}

// ===== FILTERING =====
function filtered(){
  let r=LEADS;
  if(F_SITUACAO!=='Todos')r=r.filter(l=>situacaoOf(l)===F_SITUACAO);
  if(SEARCH){const q=SEARCH.toLowerCase();r=r.filter(l=>[l.nome,l.empresa,l.cargo,l.recomendante].some(x=>(x||'').toLowerCase().includes(q)));}
  if(F_ETAPA)r=r.filter(l=>l.etapa===F_ETAPA);
  if(F_RESP)r=r.filter(l=>l.responsavel===F_RESP);
  if(F_ORIGEM)r=r.filter(l=>(l.origem||'')===F_ORIGEM);
  if(F_RECOM)r=r.filter(l=>(l.recomendante||'')===F_RECOM);
  if(F_MONEY)r=r.filter(l=>l.renda_estimada>=10000);
  return r;
}

// ===== RENDER =====
function render(){
  $('#view-title').textContent = VIEW==='funil'?'Funil':'Lista de leads';
  document.querySelectorAll('.nav-item[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===VIEW));
  const c=$('#content');
  c.innerHTML = filtersHTML() + (VIEW==='funil'?funilHTML():listaHTML());
  wireFilters();
  if(VIEW==='funil') wireFunil(); else wireLista();
  wireStatusButtons();
}
function filtersHTML(){
  const data=filtered();
  const tot=data.length, money=data.filter(l=>l.renda_estimada>=10000).length;
  // contagem por situação (sobre toda a base, ignorando o filtro de situação)
  const sitCount=s=>LEADS.filter(l=>situacaoOf(l)===s).length;
  const sitTabs=['Ativo','Dormente','Convertido','Descartado','Todos'].map(s=>{
    const n = s==='Todos'?LEADS.length:sitCount(s);
    const lbl = s==='Ativo'?'Ativos':s==='Dormente'?'Dormentes':s==='Convertido'?'Convertidos':s==='Descartado'?'Descartados':'Todos';
    return `<button class="chip ${F_SITUACAO===s?'on':''}" data-sit="${s}">${lbl} <span style="opacity:.7">${n}</span></button>`;
  }).join('');
  const origens=[...new Set(LEADS.map(l=>l.origem).filter(Boolean))].sort();
  const recoms=[...new Set(LEADS.map(l=>l.recomendante).filter(Boolean))].sort();
  return `
  <div class="filters" style="margin-bottom:6px">${sitTabs}</div>
  <div class="summary">
    <div class="scard"><div class="n">${tot}</div><div class="l">leads na visão</div></div>
    <div class="scard"><div class="n" style="color:var(--green)">${money}</div><div class="l">renda ≥ 10k</div></div>
  </div>
  <div class="filters">
    <select class="fsel" id="f-etapa"><option value="">Todas as etapas</option>${ETAPAS.map(e=>`<option value="${e}" ${F_ETAPA===e?'selected':''}>${ETAPA_LABEL[e]}</option>`).join('')}</select>
    <select class="fsel" id="f-origem"><option value="">Toda origem</option>${origens.map(o=>`<option value="${esc(o)}" ${F_ORIGEM===o?'selected':''}>${esc(o)}</option>`).join('')}</select>
    <select class="fsel" id="f-recom"><option value="">Todo recomendante</option>${recoms.map(o=>`<option value="${esc(o)}" ${F_RECOM===o?'selected':''}>${esc(o)}</option>`).join('')}</select>
    <button class="chip ${F_RESP==='Gustavo'?'on':''}" data-resp="Gustavo">Juca</button>
    <button class="chip ${F_RESP==='Victor'?'on':''}" data-resp="Victor">Victor</button>
    <button class="chip money ${F_MONEY?'on':''}" id="f-money">💰 Renda ≥ 10k</button>
  </div>`;
}
function wireFilters(){
  const fe=$('#f-etapa'); if(fe)fe.onchange=e=>{F_ETAPA=e.target.value;render();};
  const fo=$('#f-origem'); if(fo)fo.onchange=e=>{F_ORIGEM=e.target.value;render();};
  const fr=$('#f-recom'); if(fr)fr.onchange=e=>{F_RECOM=e.target.value;render();};
  document.querySelectorAll('[data-sit]').forEach(b=>b.onclick=()=>{F_SITUACAO=b.dataset.sit;render();});
  document.querySelectorAll('[data-resp]').forEach(b=>b.onclick=()=>{F_RESP=F_RESP===b.dataset.resp?'':b.dataset.resp;render();});
  const fm=$('#f-money'); if(fm)fm.onclick=()=>{F_MONEY=!F_MONEY;render();};
}

function listaHTML(){
  const rows=filtered().map(l=>`
    <tr class="row" data-open="${l.id}">
      <td><div class="lead-cell">${avatarHTML(l)}<div><div class="lead-name">${esc(l.nome)} ${flagsHTML(l)}</div><div class="lead-cargo">${esc(l.cargo||'—')}</div></div></div></td>
      <td>${esc(l.empresa||'—')}</td>
      <td>${rendaHTML(l)}</td>
      <td>${statusBadge(l)}</td>
      <td><span class="muted">${esc(l.responsavel||'')}</span></td>
      <td>${l.score?`<span class="score" style="background:${SCORE_COLOR[l.score]}">${l.score}</span>`:'<span class="muted">—</span>'}</td>
    </tr>`).join('');
  return `<div class="tablewrap"><table>
    <thead><tr><th>Lead</th><th>Empresa</th><th>Renda</th><th>Status</th><th>Resp.</th><th>Score</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" class="muted" style="padding:24px;text-align:center">Nenhum lead nessa visão.</td></tr>'}</tbody>
  </table></div>`;
}
function wireLista(){
  document.querySelectorAll('tr.row').forEach(r=>r.onclick=e=>{if(e.target.closest('[data-status-btn]'))return;openDrawer(r.dataset.open);});
}

function funilHTML(){
  const data=filtered();
  const cols=ETAPAS.filter(e=>e!=='Descartado'||data.some(l=>l.etapa==='Descartado')).map(e=>{
    const items=data.filter(l=>l.etapa===e);
    return `<div class="col" data-etapa="${e}">
      <h3>${ETAPA_LABEL[e]} <span class="count">${items.length}</span></h3>
      <div class="cards">${items.map(kcard).join('')}</div>
    </div>`;
  }).join('');
  return `<div class="funil">${cols}</div>`;
}
function kcard(l){
  return `<div class="kcard" draggable="true" data-id="${l.id}">
    <div class="top">${avatarHTML(l,30)}<div><div class="nm">${esc(l.nome)}</div><div class="emp">${esc(l.empresa||'—')}</div></div></div>
    <div class="meta">${rendaHTML(l)} ${statusBadge(l)}</div>
  </div>`;
}
function wireFunil(){
  let dragId=null;
  document.querySelectorAll('.kcard').forEach(c=>{
    c.ondragstart=e=>{dragId=c.dataset.id;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
    c.ondragend=()=>{dragId=null;c.classList.remove('dragging');};
    c.onclick=e=>{if(e.target.closest('[data-status-btn]'))return;openDrawer(c.dataset.id);};
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add('drop');};
    col.ondragleave=()=>col.classList.remove('drop');
    col.ondrop=async e=>{e.preventDefault();col.classList.remove('drop');
      const et=col.dataset.etapa, l=LEADS.find(x=>x.id===dragId);
      if(!l||l.etapa===et)return;
      const ns=STATUS_BY_ETAPA[et][0];
      if(await updateLead(l.id,{status:ns})){toast(`${firstName(l.nome)} → ${ns}`);render();}
    };
  });
}

// status dropdown (inline, works in lista + funil)
function wireStatusButtons(){
  document.querySelectorAll('[data-status-btn]').forEach(b=>{
    b.onclick=e=>{e.stopPropagation();openStatusMenu(b,b.dataset.statusBtn);};
  });
}
function openStatusMenu(anchor,id){
  closeMenus();
  const l=LEADS.find(x=>x.id===id);
  const m=document.createElement('div');
  m.className='statusmenu';
  m.style.cssText='position:fixed;z-index:70;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:6px;max-height:340px;overflow:auto;width:240px';
  m.innerHTML=ETAPAS.map(e=>`<div style="font-size:10px;text-transform:uppercase;color:var(--muted);padding:6px 8px 2px;font-weight:700">${ETAPA_LABEL[e]}</div>`+
    STATUS_BY_ETAPA[e].map(s=>`<div class="smi" data-s="${esc(s)}" style="padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;${s===l.status?'background:#eff6ff;font-weight:700':''}"><span style="width:7px;height:7px;border-radius:50%;background:${ETAPA_COLOR[e]}"></span>${esc(s)}</div>`).join('')
  ).join('');
  document.body.appendChild(m);
  const r=anchor.getBoundingClientRect();
  m.style.top=Math.min(r.bottom+4,window.innerHeight-350)+'px';
  m.style.left=Math.min(r.left,window.innerWidth-250)+'px';
  m.querySelectorAll('.smi').forEach(it=>it.onclick=async ev=>{ev.stopPropagation();
    const ns=it.dataset.s; closeMenus();
    if(ns!==l.status&&await updateLead(id,{status:ns})){toast(`${firstName(l.nome)} → ${ns}`);render();}
  });
  setTimeout(()=>document.addEventListener('click',closeMenus,{once:true}),0);
}
function closeMenus(){document.querySelectorAll('.statusmenu').forEach(m=>m.remove());}

// ===== DRAWER =====

    <div class="dh">${avatarHTML(l,48)}<div><h2>${esc(l.nome)}</h2><div class="muted">${esc(l.cargo||'')} ${l.empresa?'· '+esc(l.empresa):''}</div></div><span class="x" id="dx">×</span></div>
    <div style="margin:6px 0 4px">${statusBadge(l)} ${flagsHTML(l)}</div>
    <div class="row2">
      <div class="field"><label>Cargo</label><input id="d-cargo" value="${esc(l.cargo||'')}"></div>
      <div class="field"><label>Empresa</label><input id="d-empresa" value="${esc(l.empresa||'')}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Renda estimada (R$)</label><input id="d-renda" type="number" value="${l.renda_estimada??''}"></div>
      <div class="field"><label>Idade</label><input id="d-idade" type="number" value="${l.faixa_idade??''}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Telefone</label><input id="d-tel" value="${esc(l.telefone||'')}"></div>
      <div class="field"><label>Sexo</label><select id="d-sexo"><option value="">—</option>${['Masculino','Feminino','Outro'].map(s=>`<option ${l.sexo===s?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="row2">
      <div class="field"><label>Status</label><select id="d-status">${ETAPAS.map(e=>`<optgroup label="${ETAPA_LABEL[e]}">${STATUS_BY_ETAPA[e].map(s=>`<option ${l.status===s?'selected':''}>${esc(s)}</option>`).join('')}</optgroup>`).join('')}</select></div>
      <div class="field"><label>Responsável</label><select id="d-resp">${['Gustavo','Victor'].map(s=>`<option ${l.responsavel===s?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>LinkedIn</label><input id="d-url" value="${esc(l.linkedin_url||'')}"></div>
    <div class="field"><label>Observações</label><textarea id="d-obs" rows="2">${esc(l.observacoes||'')}</textarea></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn primary" id="d-save">Salvar</button>
      <button class="btn ghost" id="d-msg">📩 Copiar mensagem</button>
      <button class="btn ghost" id="d-call">📞 +1 ligação (${l.tentativas_ligacao||0})</button>
    </div>
    <h3 style="margin:20px 0 8px;font-size:13px">Histórico</h3>
    <div class="timeline" id="d-tl"><div class="muted">carregando...</div></div>
  </div>`;
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
  $('#dx').onclick=()=>ov.remove();
  $('#d-save').onclick=async()=>{
    const ph=normPhone($('#d-tel').value);
    const patch={cargo:$('#d-cargo').value||null,empresa:$('#d-empresa').value||null,
      renda_estimada:$('#d-renda').value?Number($('#d-renda').value):null,renda_auto:false,
      faixa_idade:$('#d-idade').value?Number($('#d-idade').value):null,
      telefone:ph.telefone,telefone_e164:ph.e164,sexo:$('#d-sexo').value||null,
      status:$('#d-status').value,responsavel:$('#d-resp').value,
      linkedin_url:$('#d-url').value||null,linkedin_url_norm:normUrl($('#d-url').value),
      observacoes:$('#d-obs').value||null};
    if(await updateLead(id,patch)){toast('Salvo');ov.remove();render();}
  };
  $('#d-msg').onclick=()=>{
    const msg=`Olá ${firstName(l.nome)}, tudo bem contigo? Encontrei seu perfil por meio de colegas que temos em comum. Acredito que pode haver sinergia em um projeto pelo qual sou responsável. Espero poder me conectar e evoluir essa conversa caso faça sentido para ambos.`;
    navigator.clipboard.writeText(msg).then(()=>toast('Mensagem copiada'));
  };
  $('#d-call').onclick=async()=>{
    const n=(l.tentativas_ligacao||0)+1;
    if(await updateLead(id,{tentativas_ligacao:n})){await sb.from('lead_events').insert({lead_id:id,tipo:'ligacao',texto:'Tentativa de ligação #'+n,usuario:ME});toast('Ligação registrada');loadTimeline(id);}
  };

async function loadTimeline(id){
  const {data}=await sb.from('lead_events').select('*').eq('lead_id',id).order('criado_em',{ascending:false});
  const el=$('#d-tl'); if(!el)return;
  if(!data||!data.length){el.innerHTML='<div class="muted">Sem eventos ainda.</div>';return;}
  el.innerHTML=data.map(ev=>`<div class="tl-item"><div>${esc(ev.texto||ev.tipo)}${ev.para_status?` <b>→ ${esc(ev.para_status)}</b>`:''}</div><div class="tl-when">${new Date(ev.criado_em).toLocaleString('pt-BR')} · ${esc(ev.usuario||'')}</div></div>`).join('');
}

// ===== NOVO LEAD / GARIMPO =====
function openNovo(mine){
  const ov=document.createElement('div');ov.className='overlay';ov.style.justifyContent='center';ov.style.alignItems='center';
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <h2>${mine?'⛏ Garimpo — adição rápida':'Novo lead'}</h2>
    <p class="hint">Cole a <b>URL do LinkedIn</b> ou o <b>JSON da extensão ⛏ Captar</b>. ${mine?'Após salvar, o campo limpa pra você emendar o próximo.':''}</p>
    <div class="field"><label>URL ou JSON da extensão</label><textarea id="n-raw" rows="3" placeholder="https://www.linkedin.com/in/... ou {&quot;nome&quot;:...}"></textarea></div>
    <div class="row2">
      <div class="field"><label>Nome</label><input id="n-nome"></div>
      <div class="field"><label>Responsável</label><select id="n-resp"><option ${ME.includes('victor')?'selected':''}>Victor</option><option ${!ME.includes('victor')?'selected':''}>Gustavo</option></select></div>
    </div>
    <div class="row2">
      <div class="field"><label>Cargo</label><input id="n-cargo"></div>
      <div class="field"><label>Empresa</label><input id="n-empresa"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Telefone</label><input id="n-tel"></div>
      <div class="field"><label>Cidade</label><input id="n-cidade"></div>
    </div>
    <div id="n-dup" class="auth-err"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn primary" id="n-save">Salvar lead</button>
      <button class="btn ghost" id="n-close">Fechar</button>
    </div>
  </div>`;
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
  $('#n-close').onclick=()=>ov.remove();
  let foto=null;
  $('#n-raw').oninput=e=>{
    const v=e.target.value.trim();
    if(v.startsWith('{')){try{const j=JSON.parse(v);
      $('#n-nome').value=j.nome||j.name||'';$('#n-cargo').value=j.cargo||j.headline||'';
      $('#n-empresa').value=j.empresa||j.company||'';$('#n-cidade').value=j.cidade||j.city||'';
      $('#n-tel').value=j.telefone||j.phone||'';foto=j.foto_url||j.foto||j.photo||null;
      e.target.dataset.url=j.url||j.linkedin_url||'';
    }catch(_){}}
    else if(v.includes('linkedin.com/in/')){
      e.target.dataset.url=v;
      if(!$('#n-nome').value){const slug=(v.split('/in/')[1]||'').split(/[/?]/)[0].replace(/-?\d+\w*$/,'').replace(/-/g,' ');$('#n-nome').value=slug.replace(/\b\w/g,c=>c.toUpperCase());}
    }
  };
  $('#n-save').onclick=async()=>{
    const nome=$('#n-nome').value.trim(); if(!nome){toast('Informe o nome');return;}
    const url=$('#n-raw').dataset.url||'';const norm=normUrl(url);
    if(norm&&LEADS.some(l=>l.linkedin_url_norm===norm)){$('#n-dup').textContent='⚠ Já existe um lead com esse LinkedIn.';return;}
    const ph=normPhone($('#n-tel').value);
    const flags=ph.telefone&&!ph.e164&&$('#n-tel').value?['SEM_DDD']:[];
    const rec={nome,primeiro_nome:firstName(nome),cargo:$('#n-cargo').value||null,empresa:$('#n-empresa').value||null,
      cidade:$('#n-cidade').value||null,linkedin_url:url||null,linkedin_url_norm:norm,foto_url:foto,
      telefone:ph.telefone,telefone_e164:ph.e164,flags_qualidade:flags,
      status:'Aguardando Qualificacao',responsavel:$('#n-resp').value,origem:'LinkedIn'};
    const {data,error}=await sb.from('leads').insert(rec).select().single();
    if(error){$('#n-dup').textContent='Erro: '+error.message;return;}
    LEADS.push(data);toast('Lead adicionado: '+firstName(nome));
    if(mine){['n-raw','n-nome','n-cargo','n-empresa','n-tel','n-cidade'].forEach(i=>{const el=$('#'+i);el.value='';delete el.dataset.url;});foto=null;$('#n-dup').textContent='';$('#n-raw').focus();render();}
    else{ov.remove();render();}
  };
  setTimeout(()=>$('#n-raw').focus(),50);
}

// ===== IMPORTAR BASE (CSV) =====
function openImport(){
  const ov=document.createElement('div');ov.className='overlay';ov.style.justifyContent='center';ov.style.alignItems='center';
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()" style="width:560px">
    <h2>⬆ Atualizar base de dados</h2>
    <p class="hint">Importe leads de um <b>CSV</b>. Eu confiro <b>duplicatas</b> (pelo LinkedIn) e <b>erros</b> e mostro a prévia — só grava no seu clique. Colunas aceitas: nome, cargo, empresa, sexo, idade, renda, telefone, email, linkedin, status, observacoes. Só <b>nome</b> é obrigatório.</p>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
      <input type="file" id="imp-file" accept=".csv,text/csv"/>
      <a id="imp-tpl" class="muted" style="cursor:pointer;text-decoration:underline;font-size:12px">baixar modelo CSV</a>
    </div>
    <div id="imp-prev"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn primary" id="imp-go" disabled>Importar novos</button>
      <button class="btn ghost" id="imp-close">Fechar</button>
    </div>
  </div>`;
  ov.onclick=()=>ov.remove();document.body.appendChild(ov);
  $('#imp-close').onclick=()=>ov.remove();
  $('#imp-tpl').onclick=()=>{
    const csv='nome,cargo,empresa,sexo,idade,renda,telefone,email,linkedin,status,observacoes\nFulano de Tal,Gerente Comercial,Empresa X,Masculino,34,12000,(81) 99999-9999,fulano@email.com,https://www.linkedin.com/in/fulano/,Aguardando Qualificacao,exemplo\n';
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='modelo_leads.csv';a.click();
  };
  let toInsert=[];
  const H=h=>(h||'').trim().toLowerCase();
  const pick=(row,keys)=>{for(const k of Object.keys(row)){if(keys.includes(H(k)))return (row[k]==null?'':String(row[k]));}return '';};
  $('#imp-file').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    Papa.parse(f,{header:true,skipEmptyLines:true,complete:res=>{
      const rows=res.data;toInsert=[];let dup=0,err=0;const seen=new Set();
      const existing=new Set(LEADS.map(l=>l.linkedin_url_norm).filter(Boolean));
      for(const r of rows){
        const nome=pick(r,['nome','name']).trim();
        if(!nome){err++;continue;}
        const url=pick(r,['linkedin','linkedin_url','url']).trim();
        const norm=normUrl(url);
        if(norm&&(existing.has(norm)||seen.has(norm))){dup++;continue;}
        if(norm)seen.add(norm);
        const ph=normPhone(pick(r,['telefone','phone','tel']));
        let status=pick(r,['status']).trim();if(!ALL_STATUS.includes(status))status='Aguardando Qualificacao';
        const renda=pick(r,['renda','renda_estimada']).replace(/[^\d]/g,'');
        const idade=pick(r,['idade','faixa_idade']).replace(/[^\d]/g,'');
        toInsert.push({nome,primeiro_nome:firstName(nome),cargo:pick(r,['cargo','headline'])||null,empresa:pick(r,['empresa','company'])||null,
          sexo:pick(r,['sexo'])||null,faixa_idade:idade?Number(idade):null,renda_estimada:renda?Number(renda):null,
          telefone:ph.telefone,telefone_e164:ph.e164,email:pick(r,['email','e-mail'])||null,
          linkedin_url:url||null,linkedin_url_norm:norm,status,responsavel:'Gustavo',origem:'LinkedIn',
          observacoes:pick(r,['observacoes','obs','observações'])||null});
      }
      $('#imp-prev').innerHTML=`<div class="summary">
        <div class="scard"><div class="n">${rows.length}</div><div class="l">linhas</div></div>
        <div class="scard"><div class="n" style="color:var(--green)">${toInsert.length}</div><div class="l">novos</div></div>
        <div class="scard"><div class="n" style="color:var(--amber)">${dup}</div><div class="l">duplicados</div></div>
        <div class="scard"><div class="n" style="color:var(--red)">${err}</div><div class="l">sem nome</div></div>
      </div><p class="hint">Duplicados e sem-nome são ignorados. Só os <b>novos</b> serão gravados.</p>`;
      $('#imp-go').disabled=toInsert.length===0;
    }});
  };
  $('#imp-go').onclick=async()=>{
    $('#imp-go').disabled=true;$('#imp-go').textContent='Importando...';
    let ok=0,fail=0;
    for(let i=0;i<toInsert.length;i+=200){
      const batch=toInsert.slice(i,i+200);
      const {data,error}=await sb.from('leads').insert(batch).select();
      if(error){for(const row of batch){const r=await sb.from('leads').insert(row).select();r.error?fail++:ok++;}}
      else ok+=(data||[]).length;
    }
    toast(`Importados ${ok} leads`+(fail?` · ${fail} falharam`:''));
    await loadLeads();ov.remove();
  };
}

async function boot(session){
  if(session){
    ME=(session.user.user_metadata?.nome||session.user.email||'').toLowerCase();
    $('#who-foot').textContent=session.user.user_metadata?.nome||session.user.email;
    $('#auth').classList.add('hidden');$('#app').classList.remove('hidden');
    await loadLeads();
    // realtime para os 2 usuários verem mudanças ao vivo
    sb.channel('leads-rt').on('postgres_changes',{event:'*',schema:'public',table:'leads'},()=>loadLeads()).subscribe();
  }else{
    $('#auth').classList.remove('hidden');$('#app').classList.add('hidden');
  }
}
sb.auth.getSession().then(({data})=>boot(data.session));
sb.auth.onAuthStateChange((_e,session)=>{ if(_e==='SIGNED_IN'||_e==='SIGNED_OUT') boot(session); });
</script>
