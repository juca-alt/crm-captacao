      <div class="cards">${items.map(kcard).join('')}</div>
    </div>`;
  }).join('');
  return `<div class="funil">${cols}</div>`;
}
function kcard(l){
  return `<div class="kcard" draggable="true" data-id="${l.id}">${cardCore(l)}</div>`;
}
function wireFunil(){
  let dragId=null;
  document.querySelectorAll('.funil .kcard').forEach(c=>{
    c.ondragstart=e=>{dragId=c.dataset.id;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
    c.ondragend=()=>{dragId=null;c.classList.remove('dragging');};
    c.onclick=e=>{if(e.target.closest('[data-status-btn],[data-star]'))return;openDrawer(c.dataset.id);};
  });
  document.querySelectorAll('[data-star]').forEach(b=>b.onclick=async e=>{e.stopPropagation();const l=byId(b.dataset.star);if(l&&await updateLead(l.id,{prioridade:!l.prioridade}))render();});
  document.querySelectorAll('.funil .col').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add('drop');};
    col.ondragleave=()=>col.classList.remove('drop');
    col.ondrop=async e=>{e.preventDefault();col.classList.remove('drop');
      const et=col.dataset.etapa, l=byId(dragId);
      if(!l||l.etapa===et)return;
      const ns=STATUS_BY_ETAPA[et][0];
      if(await updateLead(l.id,{status:ns})){toast(`${firstName(l.nome)} → ${ns}`);render();}
    };
  });
}

const FN_ETAPAS = ['SitPlan','TA','OT','FIP 1','FIP 2','Pré-TS','TS1','TS2'];
const FN_COLOR = {'SitPlan':'#a855f7','TA':'#8b5cf6','OT':'#16a34a','FIP 1':'#0d9488','FIP 2':'#0e7490','Pré-TS':'#0891b2','TS1':'#10b981','TS2':'#047857'};
const FN_STATUS = {'SitPlan':STATUS_BY_ETAPA.SitPlan,'TA':STATUS_BY_ETAPA.TA,'OT':STATUS_BY_ETAPA.OT,'FIP 1':STATUS_BY_ETAPA.FIP,'FIP 2':[],'Pré-TS':['Onboarding'],'TS1':[],'TS2':['Convertido']};
function fnStage(l){
  switch(l.etapa){
    case 'SitPlan': return 'SitPlan';

    case 'OT': return 'OT';

function fnBase(){ return baseLeads().filter(l=>CAP_STAGES.includes(l.etapa)&&periodMatch(l.criado_em,F_PERIODO)); }

function fnLeads(stage){ return fnBase().filter(l=>fnStage(l)===stage); }
function fnListHTML(leads){
  if(!leads.length) return `<div class="fnempty">Nenhum lead em <b>${esc(FN_STAGE)}</b>.</div>`;

function fnCard(l){
  return `<div class="kcard" data-open="${l.id}">

async function loadTimeline(id){
  const {data}=await sb.from('lead_events').select('*').eq('lead_id',id).order('criado_em',{ascending:false});
  const el=$('#d-tl'); if(!el)return;
  if(!data||!data.length){el.innerHTML='<div class="muted">Sem eventos ainda.</div>';return;}
  const ic={status:'🔄',ligacao:'📞',nota:'📝',mensagem:'💬',agenda:'📅',criado:'✨'};
  el.innerHTML=data.map(ev=>`<div class="tl-item"><div>${ic[ev.tipo]||'•'} ${esc(ev.texto||ev.tipo)}${ev.para_status?` <b>→ ${esc(ev.para_status)}</b>`:''}</div><div class="tl-when">${new Date(ev.criado_em).toLocaleString('pt-BR')} · ${esc(ev.usuario||'')}</div></div>`).join('');
}

function openImport(){
  const ov=document.createElement('div');ov.className='overlay';ov.style.justifyContent='center';ov.style.alignItems='center';
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()" style="width:560px">
    <h2>⬆ Atualizar base de dados</h2>
    <p class="hint">Importe leads de um <b>CSV</b>. Eu confiro <b>duplicatas</b> (pelo LinkedIn) e <b>erros</b> e mostro a prévia — só grava no seu clique. Colunas aceitas: nome, cargo, empresa, sexo, idade, renda, telefone, email, linkedin, status, observacoes. Só <b>nome</b> é obrigatório.</p>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
      <input type="file" id="imp-file" accept=".csv,text/csv"/>
      <a id="imp-tpl" class="muted" style="cursor:pointer;text-decoration:underline;font-size:12px">baixar modelo CSV</a>
    </div>
    <div id="imp-prev"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn primary" id="imp-go" disabled>Importar novos</button>
      <button class="btn ghost" id="imp-close">Fechar</button>
    </div>
  </div>`;
  ov.onclick=()=>ov.remove();document.body.appendChild(ov);
  $('#imp-close').onclick=()=>ov.remove();
  $('#imp-tpl').onclick=()=>{
    const csv='nome,cargo,empresa,sexo,idade,renda,telefone,email,linkedin,status,observacoes\nFulano de Tal,Gerente Comercial,Empresa X,Masculino,34,12000,(81) 99999-9999,fulano@email.com,https://www.linkedin.com/in/fulano/,Aguardando Qualificacao,exemplo\n';
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='modelo_leads.csv';a.click();
  };
  let toInsert=[];
  const H=h=>(h||'').trim().toLowerCase();
  const pick=(row,keys)=>{for(const k of Object.keys(row)){if(keys.includes(H(k)))return (row[k]==null?'':String(row[k]));}return '';};
  $('#imp-file').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    Papa.parse(f,{header:true,skipEmptyLines:true,complete:res=>{
      const rows=res.data;toInsert=[];let dup=0,err=0;const seen=new Set();
      const existing=new Set(LEADS.map(l=>l.linkedin_url_norm).filter(Boolean));
      for(const r of rows){
        const nome=pick(r,['nome','name']).trim();
        if(!nome){err++;continue;}
        const url=pick(r,['linkedin','linkedin_url','url']).trim();
        const norm=normUrl(url);
        if(norm&&(existing.has(norm)||seen.has(norm))){dup++;continue;}
        if(norm)seen.add(norm);
        const ph=normPhone(pick(r,['telefone','phone','tel']));
        let status=pick(r,['status']).trim();if(!ALL_STATUS.includes(status))status='Aguardando Qualificacao';
        const renda=pick(r,['renda','renda_estimada']).replace(/[^\d]/g,'');
        const idade=pick(r,['idade','faixa_idade']).replace(/[^\d]/g,'');
        toInsert.push({nome,primeiro_nome:firstName(nome),cargo:pick(r,['cargo','headline'])||null,empresa:pick(r,['empresa','company'])||null,
          sexo:pick(r,['sexo'])||null,faixa_idade:idade?Number(idade):null,renda_estimada:renda?Number(renda):null,
          telefone:ph.telefone,telefone_e164:ph.e164,email:pick(r,['email','e-mail'])||null,
          linkedin_url:url||null,linkedin_url_norm:norm,status,responsavel:'Gustavo',origem:'LinkedIn',
          observacoes:pick(r,['observacoes','obs','observações'])||null});
      }
      $('#imp-prev').innerHTML=`<div class="summary">
        <div class="scard"><div class="n">${rows.length}</div><div class="l">linhas</div></div>
        <div class="scard"><div class="n" style="color:var(--green)">${toInsert.length}</div><div class="l">novos</div></div>
        <div class="scard"><div class="n" style="color:var(--amber)">${dup}</div><div class="l">duplicados</div></div>
        <div class="scard"><div class="n" style="color:var(--red)">${err}</div><div class="l">sem nome</div></div>
      </div><p class="hint">Duplicados e sem-nome são ignorados. Só os <b>novos</b> serão gravados.</p>`;
      $('#imp-go').disabled=toInsert.length===0;
    }});
  };
  $('#imp-go').onclick=async()=>{
    $('#imp-go').disabled=true;$('#imp-go').textContent='Importando...';
    let ok=0,fail=0;
    for(let i=0;i<toInsert.length;i+=200){
      const batch=toInsert.slice(i,i+200);
      const {data,error}=await sb.from('leads').insert(batch).select();
      if(error){for(const row of batch){const r=await sb.from('leads').insert(row).select();if(!r.error)ok++;else if(r.error.code==='23505'){/* viola chave única = já existe; não duplica nem conta como falha */}else fail++;}}
      else ok+=(data||[]).length;
    }
    toast(`Importados ${ok} leads`+(fail?` · ${fail} falharam`:''));
    await loadLeads();ov.remove();
  };
}

// ===== DUPLICATAS + UNIFICAR =====
const MERGE_FIELDS=[['nome','Nome'],['cargo','Cargo'],['empresa','Empresa'],['telefone','Telefone'],['email','E-mail'],['linkedin_url','LinkedIn'],['faixa_idade','Idade'],['renda_estimada','Renda'],['sexo','Sexo'],['cidade','Cidade'],['status','Status'],['responsavel','Resp.'],['origem','Origem'],['recomendante','Recomendante'],['score','Score'],['observacoes','Observações']];
function dupGroups(){
  const norm=s=>(s||'').toLowerCase().replace(/\s+/g,' ').trim();
  const byKey={};
  const add=(k,l,kind)=>{ if(!k) return; const id=kind+'::'+k; (byKey[id]=byKey[id]||{kind,leads:[]}).leads.push(l); };
  for(const l of LEADS){ add(l.linkedin_url_norm,l,'LinkedIn'); add(l.telefone_e164,l,'Telefone'); add(norm(l.nome),l,'Nome'); }
  const groups=[]; const seen=new Set();
  for(const k in byKey){
    const uniq=[...new Map(byKey[k].leads.map(l=>[l.id,l])).values()];
    if(uniq.length<2) continue;
    const sig=uniq.map(l=>l.id).sort().join('|'); if(seen.has(sig)) continue; seen.add(sig);
    groups.push({kind:byKey[k].kind, leads:uniq});
  }
  return groups;
}
// rank de avanço no funil (Descartado/Dormente contam como baixo, pra não "manter" um lead descartado)
function statusRank(s){ const et=STATUS_ETAPA[s]; if(et==='Descartado'||et==='Dormente') return -1; const i=ALL_STATUS.indexOf(s); return i<0?0:i; }
// plano de unificação automática de um grupo: mantém o mais avançado, junta observações, preenche campos
function autoMergePlan(g){
  const filled=l=>MERGE_FIELDS.reduce((n,[f])=>n+((l[f]!=null&&String(l[f]).trim()!=='')?1:0),0);
  const keepLead=[...g.leads].sort((a,b)=>(statusRank(b.status)-statusRank(a.status))||((b.codigo?1:0)-(a.codigo?1:0))||(filled(b)-filled(a)))[0];
  const patch={};
  for(const [f] of MERGE_FIELDS){
    if(f==='observacoes'){ const parts=[...new Set(g.leads.map(l=>(l.observacoes||'').trim()).filter(Boolean))]; patch.observacoes=parts.join(' · ')||null; continue; }
    let v=keepLead[f];
    if(v==null||String(v).trim()===''){ const src=g.leads.find(l=>l[f]!=null&&String(l[f]).trim()!==''); v=src?src[f]:null; }
    if(v==='')v=null; patch[f]=v;
  }
  return {keep:keepLead.id, patch};
}
async function applyMerge(g,keep,patch){
  if(!await updateLead(keep,patch)) return false;
  for(const l of g.leads){ if(l.id!==keep){ const r=await sb.from('leads').delete().eq('id',l.id); if(!r.error){ const i=LEADS.findIndex(x=>x.id===l.id); if(i>=0)LEADS.splice(i,1); } } }
  return true;
}
function dupHTML(){
  const groups=dupGroups();
  if(!groups.length) return '<div class="tablewrap" style="padding:24px"><b>Nenhuma duplicata encontrada 🎉</b><div class="muted" style="margin-top:6px">A base está limpa por LinkedIn, telefone e nome.</div></div>';
  return `<p class="hint" style="margin-bottom:10px"><b>${groups.length}</b> possíveis duplicatas (mesmo LinkedIn, telefone ou nome). Marque vários e use <b>⚡ Unificar selecionados</b> pra resolver em lote (mantém o mais avançado no funil, junta as observações e os campos, remove os outros), ou <b>Revisar</b> pra escolher campo a campo.</p>
  <div class="filters" style="margin-bottom:10px;gap:12px;align-items:center">
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" id="dup-all"> Selecionar todos</label>
    <span class="muted" id="dup-count" style="font-size:13px">0 selecionados</span>
    <button class="btn primary" id="dup-merge-sel" disabled>⚡ Unificar selecionados (auto)</button>
  </div>`+
   groups.map((g,i)=>`<div class="tablewrap" style="margin-bottom:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:10px">
     <label style="display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0"><input type="checkbox" class="dup-cb" data-i="${i}">
       <span style="min-width:0"><span class="flag warn">${g.kind} igual</span> ${g.leads.map(l=>`${esc(l.nome)} <span class="muted">(${esc(ETAPA_LABEL[l.etapa]||l.etapa)})</span>`).join(' &nbsp;·&nbsp; ')}</span></label>
     <button class="btn ghost" data-merge="${i}" style="flex-shrink:0">Revisar</button>
   </div>`).join('');
}
function wireDup(){
  const groups=dupGroups();
  document.querySelectorAll('[data-merge]').forEach(b=>b.onclick=()=>openMerge(groups[+b.dataset.merge]));
  const cbs=()=>[...document.querySelectorAll('.dup-cb')];
  const upd=()=>{ const n=cbs().filter(c=>c.checked).length; const cnt=$('#dup-count'); if(cnt)cnt.textContent=n+' selecionado'+(n===1?'':'s'); const b=$('#dup-merge-sel'); if(b)b.disabled=!n; };
  cbs().forEach(c=>c.onchange=upd);
  const all=$('#dup-all'); if(all)all.onchange=()=>{ cbs().forEach(c=>c.checked=all.checked); upd(); };
  const go=$('#dup-merge-sel'); if(go)go.onclick=async()=>{
    const sel=cbs().filter(c=>c.checked).map(c=>groups[+c.dataset.i]); if(!sel.length) return;
    const nomeGrupos=sel.filter(g=>g.kind==='Nome').length;
    const aviso=nomeGrupos?`\n\n⚠ ${nomeGrupos} grupo(s) casam só por NOME — homônimos (pessoas diferentes com o mesmo nome) seriam fundidos e um deles REMOVIDO sem desfazer. Recomendo "Revisar" esses individualmente.`:'';
    if(!confirm(`Unificar ${sel.length} grupo(s) no automático?${aviso}\n\nEm cada um: mantém o lead mais avançado no funil, junta observações e campos preenchidos, e REMOVE os duplicados (não dá pra desfazer). Os casos delicados, prefira o "Revisar".`)) return;
    go.disabled=true; let ok=0, fail=0;
    for(const g of sel){ const {keep,patch}=autoMergePlan(g); if(await applyMerge(g,keep,patch))ok++; else fail++; go.textContent=`Unificando… ${ok}/${sel.length}`; }
    toast(`${ok} grupo(s) unificado(s)`+(fail?`, ${fail} falhou`:'')); render();
  };
}
function openMerge(g){
  let keep=g.leads[0].id;
  const chosen={};
  MERGE_FIELDS.forEach(([f])=>{ const src=g.leads.find(l=>l[f]!=null&&String(l[f]).trim()!==''); chosen[f]=src?src.id:g.leads[0].id; });
  const ov=document.createElement('div');ov.className='overlay';ov.style.justifyContent='center';ov.style.alignItems='center';
  const cell=(l,f)=>{const v=l[f]; return (v==null||String(v).trim()==='')?'<span class="muted">—</span>':esc(String(v));};
  function draw(){
    const head=g.leads.map(l=>`<th style="text-align:left;padding:8px"><label style="cursor:pointer;font-weight:700"><input type="radio" name="keep" ${keep===l.id?'checked':''} data-keep="${l.id}"/> Manter este</label><div class="muted" style="font-weight:400">${esc(l.codigo||'novo')}</div></th>`).join('');
    const rows=MERGE_FIELDS.map(([f,lbl])=>`<tr><td style="padding:6px 8px;font-weight:600;color:var(--muted);white-space:nowrap">${lbl}</td>${g.leads.map(l=>`<td data-pick="${f}|${l.id}" style="padding:6px 8px;cursor:pointer;border-radius:6px;${chosen[f]===l.id?'background:#eff6ff;outline:2px solid var(--primary)':''}">${cell(l,f)}</td>`).join('')}</tr>`).join('');
    return `<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr><th></th>${head}</tr></thead><tbody>${rows}</tbody></table>`;
  }
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()" style="width:760px;max-width:96vw">
    <h2>Unificar duplicata</h2>
    <p class="hint">Escolha <b>qual registro manter</b> (radio) e <b>clique no valor</b> que vale em cada linha. Os outros registros serão <b>removidos</b>.</p>
    <div id="mg-body" style="overflow:auto;max-height:60vh">${draw()}</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn primary" id="mg-go">Unificar e remover os outros</button>
      <button class="btn ghost" id="mg-close">Cancelar</button>
    </div>
  </div>`;
  ov.onclick=()=>ov.remove();document.body.appendChild(ov);
  $('#mg-close').onclick=()=>ov.remove();
  function rewire(){
    $('#mg-body').innerHTML=draw();
    $('#mg-body').querySelectorAll('[data-keep]').forEach(r=>r.onchange=()=>{keep=r.dataset.keep;});
    $('#mg-body').querySelectorAll('[data-pick]').forEach(c=>c.onclick=()=>{const [f,id]=c.dataset.pick.split('|');chosen[f]=id;rewire();});
  }
  rewire();
  $('#mg-go').onclick=async()=>{
    if(!confirm('Unificar? Os dados escolhidos vão pro registro mantido e os outros '+(g.leads.length-1)+' serão removidos permanentemente.')) return;
    $('#mg-go').disabled=true;$('#mg-go').textContent='Unificando...';
    const patch={};
    MERGE_FIELDS.forEach(([f])=>{ const src=g.leads.find(l=>l.id===chosen[f]); let v=src?src[f]:null; if(v==='')v=null; patch[f]=v; });
    const ok=await updateLead(keep,patch);
    if(ok){
      for(const l of g.leads){ if(l.id!==keep){ const r=await sb.from('leads').delete().eq('id',l.id); if(!r.error){const i=LEADS.findIndex(x=>x.id===l.id);if(i>=0)LEADS.splice(i,1);} } }
      toast('Unificado! '+(g.leads.length-1)+' removido(s).');
      ov.remove(); render();
    } else { $('#mg-go').disabled=false;$('#mg-go').textContent='Unificar e remover os outros'; }
  };
}

function miningLoad(){ try{ const s=localStorage.getItem('mining_session'); MINING=s?JSON.parse(s):null; }catch(e){ MINING=null; } }
function miningSave(){ try{ MINING?localStorage.setItem('mining_session',JSON.stringify(MINING)):localStorage.removeItem('mining_session'); }catch(e){} }
function miningCount(){ if(!MINING)return 0; const t0=new Date(MINING.inicioISO).getTime(); return LEADS.filter(l=>l.responsavel===MY_NAME&&l.criado_em&&new Date(l.criado_em).getTime()>=t0).length; }
function miningElapsed(){ if(!MINING)return 0; return Math.max(0,Math.floor((Date.now()-new Date(MINING.inicioISO).getTime())/1000)); }
function fmtClock(sec){ const m=Math.floor(sec/60), s=sec%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function fmtH(sec){ const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return h?`${h}h${String(m).padStart(2,'0')}`:`${m}min`; }
function startMining(metaMin){ MINING={inicioISO:new Date().toISOString(),metaSeg:metaMin?metaMin*60:0}; miningSave(); render(); }
async function stopMining(){
  if(!MINING)return;
  const dur=miningElapsed(), caps=miningCount();
  const rec={usuario:MY_NAME,email:ME,inicio:MINING.inicioISO,fim:new Date().toISOString(),duracao_seg:dur,meta_seg:MINING.metaSeg||null,capturas:caps};
  MINING=null; miningSave(); stopMiningTick();
  const {error}=await sb.from('mining_sessions').insert(rec);
  if(error){ toast('Sessão encerrada — relatório não gravou (rode migration_v1_18.sql)'); }
  else { const perH=dur>0?Math.round(caps/(dur/3600)):caps; toast(`💪 ${caps} capturas em ${fmtClock(dur)} · ${perH}/h. Mandou bem, ${firstName(MY_NAME)}!`); }
  render();
}
function stopMiningTick(){ if(MINING_TICK){ clearInterval(MINING_TICK); MINING_TICK=null; } }
function startMiningTick(){
  stopMiningTick();
  MINING_TICK=setInterval(()=>{
    const cl=$('#mine-clock'); if(!cl){ stopMiningTick(); return; }
    cl.textContent=fmtClock(miningElapsed());
    const cc=$('#mine-caps'); if(cc)cc.textContent=miningCount();
    const pb=$('#mine-prog'); if(pb&&MINING&&MINING.metaSeg)pb.style.width=Math.min(100,(miningElapsed()/MINING.metaSeg)*100)+'%';
  },1000);
}

function qualMatch(l){
  if(QF_RENDA){const r=l.renda_estimada||0; if(QF_RENDA==='10'&&r<10000)return false; if(QF_RENDA==='10_15'&&!(r>=10000&&r<15000))return false; if(QF_RENDA==='15'&&r<15000)return false;}
  if(QF_IDADE){const a=l.faixa_idade||0; if(QF_IDADE==='30_35'&&!(a>=30&&a<=35))return false; if(QF_IDADE==='36_40'&&!(a>=36&&a<=40))return false; if(QF_IDADE==='41'&&a<41)return false;}
  if(QF_SEXO&&(l.sexo||'')!==QF_SEXO)return false;
  return true;
}
function qualTags(l){
  const rendaTag=l.renda_estimada>=10000?`<span class="qtag money">R$ ${Math.round(l.renda_estimada/1000)}k</span>`:`<span class="qtag">${l.renda_estimada?('R$ '+Math.round(l.renda_estimada/1000)+'k'):'renda —'}</span>`;
  return `<span class="qtag">${l.faixa_idade?l.faixa_idade+' anos':'idade —'}</span><span class="qtag">${l.sexo?esc(l.sexo):'sexo —'}</span>${rendaTag}`;
}
function qualCard(l,acts){
  const idade=l.faixa_idade?esc(l.faixa_idade)+' anos':'';
  const hiRenda=l.renda_estimada>=10000;
  const rendaTxt=(l.renda_estimada!=null)?((l.renda_auto?'~':'')+'R$ '+Number(l.renda_estimada).toLocaleString('pt-BR')):'';

    idade?`<span class="mc-chip">🎂 ${idade}</span>`:`<span class="mc-chip pend">🎂 idade a definir</span>`,
    l.sexo?`<span class="mc-chip">${esc(l.sexo)}</span>`:'',
    rendaTxt?`<span class="mc-chip money ${hiRenda?'':'lo'}">💰 ${rendaTxt}</span>`:`<span class="mc-chip pend">💰 renda a definir</span>`,
    l.bairro?`<span class="mc-chip">📍 ${esc(l.bairro)}</span>`:''
  ].filter(Boolean).join('');

function qualColumn(title,color,leads,actGen){

      : leads.map(l=>qualCard(l,actGen(l))).join('');

  if(error){ body.innerHTML=`<div class="tablewrap" style="padding:24px"><b>Relatório indisponível.</b><div class="muted" style="margin-top:6px">Rode <code>migration_v1_18.sql</code> no Supabase pra criar a tabela de sessões de mineração.</div></div>`; return; }
  const ss=data||[];
  const byUser={};
  ss.forEach(s=>{ const u=s.usuario||'—'; const a=byUser[u]||(byUser[u]={sessoes:0,caps:0,seg:0}); a.sessoes++; a.caps+=s.capturas||0; a.seg+=s.duracao_seg||0; });

    <div class="stat"><div class="n" style="color:var(--primary)">${totSeg>0?Math.round(totCaps/(totSeg/3600)):0}</div><div class="l">capturas/hora</div></div>

function agendaProximos(){ const now=Date.now(); return baseLeads().filter(l=>l.agendamento&&new Date(l.agendamento).getTime()>=now-3600000).sort((a,b)=>new Date(a.agendamento)-new Date(b.agendamento)); }
function fmtDateTime(s){ if(!s)return''; const d=new Date(s); return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function dtLocal(s){ if(!s)return''; const d=new Date(s); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
// link que abre o Google Calendar já preenchido (funciona HOJE, sem OAuth). Sync 2-vias = Onda 2.
function gcalLink(l){
  if(!l.agendamento)return null;
  const start=new Date(l.agendamento), end=new Date(start.getTime()+60*60000);
  const f=d=>d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const text=encodeURIComponent('Captação · '+(l.nome||'Lead'));
  const det=encodeURIComponent(['CRM Captação',l.cargo||'',l.empresa?('@ '+l.empresa):'',l.telefone?('📱 '+l.telefone):'',l.linkedin_url||''].filter(Boolean).join(' · '));
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${f(start)}/${f(end)}&details=${det}`;
}

// ===== v1.25: VISÃO GERAL (radiografia da base — client-side, escopo baseLeads) =====
function vgBase(){ return baseLeads().filter(l=>periodMatch(l.criado_em,F_PERIODO)); }
function vgAtivos(){ return vgBase().filter(l=>situacaoOf(l)==='Ativo'); }
function lastNDays(n){ const out=[]; for(let i=n-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); out.push(ymd(d)); } return out; }
function sparkBars(days,series){
  // series = [{vals:{ymd:count}, color}] — colunas empilhadas por dia
  const max=Math.max(1,...days.map(d=>series.reduce((s,x)=>s+(x.vals[d]||0),0)));
  const cols=days.map(d=>{
    const tot=series.reduce((s,x)=>s+(x.vals[d]||0),0);
    const bars=series.map(x=>{ const v=x.vals[d]||0; return v?`<div class="sparkbar" style="background:${x.color};height:${Math.max(3,Math.round(v/max*100))}%" title="${v}"></div>`:''; }).join('');
    const dt=new Date(d+'T00:00:00');
    return `<div style="flex:1;min-width:0" title="${fmtDate(d)} · ${tot}"><div class="sparkcol">${bars||'<div class="sparkbar" style="background:var(--line);height:2px"></div>'}</div><div class="sparklbl">${dt.getDate()}</div></div>`;
  }).join('');
  return `<div class="sparkwrap">${cols}</div>`;
}

  const placar=uiAdmin()?`<div class="vg-card"><h3>🤝 Placar do time <small class="fp">· últimos 7 dias</small></h3><div class="tablewrap"><table><thead><tr><th>Quem</th><th>Ativos</th><th>⛏ 7d</th><th>🔗 7d</th><th>📱 na mão</th></tr></thead><tbody>${team}</tbody></table></div></div>`:'';
  // radar seguros (regra do Gustavo: nunca captar seguros/corretores)
  const segs=A.filter(l=>triageLead({cargo:l.cargo,empresa:l.empresa}).seguros);

  // gargalos: parados em etapa quente
  const stuck=A.filter(l=>['SitPlan','TA','OT','FIP'].includes(l.etapa)&&daysStuck(l)>=5).sort((a,b)=>daysStuck(b)-daysStuck(a));
  const stRows=stuck.slice(0,8).map(l=>`<div class="qrow" data-open="${l.id}">${avatarHTML(l,30)}<div class="qmain"><div class="qn">${esc(l.nome)} ${stuckBadge(daysStuck(l))}</div><div class="qsub">${ETAPA_LABEL[l.etapa]||l.etapa} · ${esc(l.status||'')}</div></div></div>`).join('');

  return kpis;

// ===== v1.25: AGORA — as melhores ações do momento (Meu Dia) =====
function agoraScore(l){
  let pts=0, motivo='';
  const hoje=todayStr(), amanha=addDays(1);
  // Etapas avançadas/saída (OT/FIP/Fechamento/Dormente/Descartado) NÃO entram pelos sinais de
  // topo de funil (telefone/inbox), que podem estar defasados (ex.: "respondeu" antigo que nunca
  // foi limpo). Elas só aparecem por compromisso agendado ou follow-up explícito que o usuário marcou.
  const adv = ['OT','FIP','Fechamento','Dormente','Descartado'].includes(l.etapa);
  if(l.agendamento){ const d=String(dtLocal(l.agendamento)).slice(0,10); if(d===hoje){pts=110;motivo='📅 compromisso HOJE — confirma';} else if(d===amanha){pts=80;motivo='📅 compromisso amanhã';} }
  if(!pts&&!adv&&l.status==='Convite Aceito (c/ telefone)'){pts=100;motivo=IS_VICTOR?'📱 telefone na mão — passa pro Juca':'📱 telefone na mão — liga agora';}
  if(!pts&&!adv&&l.inbox_hot){pts=90;motivo='🔥 conversa quente';}
  if(!pts&&!adv&&l.inbox_de_mim===false&&l.inbox_ultima_msg){pts=70;motivo='💬 respondeu — sua vez';}
  if(!pts&&isOverdue(l)){ const d=Math.floor((Date.now()-new Date(l.data_proxima_acao).getTime())/86400000); pts=60+Math.min(d,10); motivo='⏰ follow vencido há '+d+'d'; }
  if(!pts&&isDueToday(l)){pts=55;motivo='📌 follow de hoje';}
  if(pts){ if(l.prioridade)pts+=15; if(l.renda_estimada>=10000)pts+=10; }
  return {pts,motivo};
}
function agoraHTML(){
  const ranked=dayBase().map(l=>({l,...agoraScore(l)})).filter(x=>x.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,5);
  if(!ranked.length) return '';
  const rows=ranked.map(({l,motivo})=>{
    const acts=l.status==='Convite Aceito (c/ telefone)'&&!IS_VICTOR

      : `<button class="qbtn" data-act="msg" data-id="${l.id}">📩</button>`;
    return `<div class="qrow" data-open="${l.id}">${avatarHTML(l,34)}
      <div class="qmain"><div class="qn">${starBtn(l)}${esc(l.nome)}<span class="motivo">${motivo}</span></div>

  }).join('');
  return `<div class="agora"><div class="agora-h">⚡ Agora <small>· as ${ranked.length} ações que mais movem o ponteiro</small></div>${rows}</div>`;
}

// ===== v1.25: BUSCA GLOBAL ⌘K =====
let CMDK_SEL=0, CMDK_RES=[];
function cmdkMatches(q){
  if(!q) return [];
  const n=_norm(q);
  const hit=l=>[l.nome,l.empresa,l.cargo,l.telefone,l.segmento,l.bairro].some(x=>_norm(x||'').includes(n));
  return baseLeads().filter(hit).sort((a,b)=>{
    const an=_norm(a.nome||'').startsWith(n)?0:1, bn=_norm(b.nome||'').startsWith(n)?0:1;
    return an-bn||(b.prioridade?1:0)-(a.prioridade?1:0);
  }).slice(0,12);
}
function cmdkRender(){
  const box=$('#cmdk-res'); if(!box)return;
  const q=$('#cmdk-in').value.trim();
  CMDK_RES=cmdkMatches(q);
  if(!q){ box.innerHTML='<div class="vg-empty" style="padding:16px">Digite pra buscar na base inteira — nome, empresa, cargo, telefone, bairro…</div>'; return; }
  const rows=CMDK_RES.map((l,i)=>`<div class="cmdk-row ${i===CMDK_SEL?'sel':''}" data-ck="${l.id}">${avatarHTML(l,32)}
    <div class="cm"><div class="cn">${esc(l.nome)}</div><div class="cs">${esc(l.cargo||'—')}${l.empresa?' · '+esc(l.empresa):''} · ${esc(l.status||'')}</div></div>
    <div class="ck">${ETAPA_LABEL[l.etapa]||l.etapa||''}</div></div>`).join('');
  const novo=`<div class="cmdk-row ${CMDK_SEL===CMDK_RES.length?'sel':''}" data-ck="__novo"><div class="cm"><div class="cn">＋ Criar lead "${esc(q)}"</div><div class="cs">não achou? cadastra agora</div></div></div>`;
  box.innerHTML=(rows||'')+novo;
  box.querySelectorAll('[data-ck]').forEach(r=>r.onclick=()=>cmdkGo(r.dataset.ck));
}
function cmdkGo(id){
  const q=$('#cmdk-in')?$('#cmdk-in').value.trim():'';
  closeCmdk();
  if(id==='__novo'){ openNovo(false,{nome:q}); return; }
  openDrawer(id);
}
function openCmdk(){
  if($('#cmdk-bd'))return;
  CMDK_SEL=0;
  document.body.insertAdjacentHTML('beforeend',`<div class="cmdk-bd" id="cmdk-bd"><div class="cmdk">
    <input id="cmdk-in" placeholder="Buscar lead em toda a base…" autocomplete="off"/>
    <div class="cmdk-res" id="cmdk-res"></div>
    <div class="cmdk-foot"><span><span class="kbd">↑↓</span> navegar</span><span><span class="kbd">Enter</span> abrir</span><span><span class="kbd">Esc</span> fechar</span></div>
  </div></div>`);
  const bd=$('#cmdk-bd'), inp=$('#cmdk-in');
  bd.onclick=e=>{ if(e.target===bd) closeCmdk(); };
  inp.oninput=()=>{ CMDK_SEL=0; cmdkRender(); };
  inp.onkeydown=e=>{
    const max=CMDK_RES.length; // último índice = "criar lead"
    if(e.key==='ArrowDown'){ e.preventDefault(); CMDK_SEL=Math.min(CMDK_SEL+1,max); cmdkRender(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); CMDK_SEL=Math.max(CMDK_SEL-1,0); cmdkRender(); }
    else if(e.key==='Enter'){ e.preventDefault(); const sel=CMDK_SEL<CMDK_RES.length?CMDK_RES[CMDK_SEL].id:'__novo'; if($('#cmdk-in').value.trim())cmdkGo(sel); }
    else if(e.key==='Escape'){ closeCmdk(); }
  };
  cmdkRender(); inp.focus();
}
function closeCmdk(){ const bd=$('#cmdk-bd'); if(bd)bd.remove(); }

});

async function boot(session){
  if(session){
    session_nome=session.user.user_metadata?.nome||session.user.email||'';
    ME=(session.user.user_metadata?.nome||session.user.email||'').toLowerCase();
    ME_EMAIL=(session.user.email||'').toLowerCase();
    REAL_VICTOR=ME.includes('victor');
    ACT_AS=null;
    miningLoad();

    syncProfile();
    if(REAL_VICTOR && VIEW==='hoje'){ /* assistente abre no Meu Dia */ }
    $('#who-foot').textContent=session_nome;
    $('#auth').classList.add('hidden');$('#app').classList.remove('hidden');
    await loadLeads();
    // realtime para os 2 usuários verem mudanças ao vivo (inscreve só 1x; boot pode rodar 2x)
    if(!window.__rtSub){ window.__rtSub=true; let _rtT; const _rtReload=()=>{ clearTimeout(_rtT); _rtT=setTimeout(()=>loadLeads(),800); }; sb.channel('leads-rt').on('postgres_changes',{event:'*',schema:'public',table:'leads'},_rtReload).subscribe(); }
  }else{
    $('#auth').classList.remove('hidden');$('#app').classList.add('hidden');
  }
}

      <button data-c="#0f766e" style="background:#0f766e" title="Petróleo"></button>
    </div>
  </div>
  <div class="tw-row">
    <div class="tw-lab">Densidade</div>
    <div class="tw-seg" id="tw-density">
      <button data-v="comfortable">Confortável</button>
      <button data-v="compact">Compacto</button>
    </div>
  </div>
  <div class="tw-row">
    <div class="tw-lab">Barra lateral</div>
    <div class="tw-seg" id="tw-side">
      <button data-v="dark">Escura</button>
      <button data-v="light">Clara</button>
    </div>
  </div>
</div>
<script>
(function(){
  var TW_KEY='crm-tweaks-v1';
  var def={accent:'#2563eb',density:'comfortable',side:'dark'};
  var st=def;
  try{ st=Object.assign({},def,JSON.parse(localStorage.getItem(TW_KEY)||'{}')); }catch(e){}
  function apply(){
    document.documentElement.style.setProperty('--primary',st.accent);
    document.body.classList.toggle('tw-compact',st.density==='compact');
    document.body.classList.toggle('tw-side-light',st.side==='light');
    document.querySelectorAll('#tw-accent button').forEach(function(b){b.classList.toggle('on',b.dataset.c===st.accent);});
    document.querySelectorAll('#tw-density button').forEach(function(b){b.classList.toggle('on',b.dataset.v===st.density);});
    document.querySelectorAll('#tw-side button').forEach(function(b){b.classList.toggle('on',b.dataset.v===st.side);});
  }
  function save(){ try{localStorage.setItem(TW_KEY,JSON.stringify(st));}catch(e){} }
  document.getElementById('tw-fab').onclick=function(){document.getElementById('tw-panel').classList.toggle('hidden');};
  document.getElementById('tw-close').onclick=function(){document.getElementById('tw-panel').classList.add('hidden');};
  document.querySelectorAll('#tw-accent button').forEach(function(b){b.onclick=function(){st.accent=b.dataset.c;apply();save();};});
  document.querySelectorAll('#tw-density button').forEach(function(b){b.onclick=function(){st.density=b.dataset.v;apply();save();};});
  document.querySelectorAll('#tw-side button').forEach(function(b){b.onclick=function(){st.side=b.dataset.v;apply();save();};});
  apply();
})();
</script>
</body>
</html>
