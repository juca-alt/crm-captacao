<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CRM Captação · Life Planners</title>
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CRM Captação" />

<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22CRM%20Capta%C3%A7%C3%A3o%22%2C%22short_name%22%3A%22Capta%C3%A7%C3%A3o%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f1f5f9%22%2C%22theme_color%22%3A%22%230f172a%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2527http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2527%2520width%253D%2527192%2527%2520height%253D%2527192%2527%253E%253Crect%2520width%253D%2527192%2527%2520height%253D%2527192%2527%2520rx%253D%252742%2527%2520fill%253D%2527%25232563eb%2527%252F%253E%253Ctext%2520x%253D%2527096%2527%2520y%253D%2527132%2527%2520font-size%253D%2527118%2527%2520font-family%253D%2527Arial%2527%2520font-weight%253D%2527bold%2527%2520fill%253D%2527white%2527%2520text-anchor%253D%2527middle%2527%253EL%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --navy:#0f172a; --navy2:#1e293b; --line:#e2e8f0; --bg:#f1f5f9; --card:#fff;
  --txt:#0f172a; --muted:#64748b; --primary:#2563eb; --green:#16a34a; --red:#ef4444;
  --amber:#f59e0b; --violet:#8b5cf6; --teal:#0d9488; --emerald:#059669; --lk:#0a66c2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* ---------- AUTH ---------- */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e3a8a)}
.auth-card{background:#fff;border-radius:16px;padding:32px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-card h1{font-size:20px;margin-bottom:4px}
.auth-card p.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.auth-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 4px}
.auth-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px}
.auth-card button.primary{width:100%;margin-top:18px;background:var(--primary);color:#fff;padding:12px;border-radius:9px;font-weight:600}
.auth-toggle{text-align:center;margin-top:14px;font-size:13px;color:var(--muted)}
.auth-toggle a{color:var(--primary);cursor:pointer;font-weight:600}
.auth-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}

/* ---------- APP SHELL ---------- */
#app{display:flex;min-height:100vh}
.sidebar{width:226px;background:var(--navy);color:#cbd5e1;display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;color:#fff;font-weight:700}
.brand .logo{width:30px;height:30px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800}
.nav-sec{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#475569;padding:10px 10px 4px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:#cbd5e1;font-weight:500;width:100%;text-align:left;margin-bottom:2px;font-size:14px}
.nav-item:hover{background:var(--navy2);color:#fff}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item .ic{width:18px;text-align:center;font-size:15px}
.nav-item .ic.in{background:var(--lk);color:#fff;border-radius:4px;font-weight:800;font-size:11px;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center}
/* grupo/módulo expansível da barra lateral */
.nav-group-h{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:#cbd5e1;font-weight:600;width:100%;text-align:left;margin-bottom:2px;font-size:14px;cursor:pointer}
.nav-group-h:hover{background:var(--navy2);color:#fff}
.nav-group-h .chev{margin-left:auto;font-size:11px;transition:transform .15s;color:#64748b}
.nav-group-h.collapsed .chev{transform:rotate(-90deg)}
.nav-group{margin-bottom:2px}
.nav-group.collapsed{display:none}
.nav-item.sub{padding-left:24px;font-size:13.5px;color:#aab6c6}
.nav-spacer{flex:1}
.nav-foot{font-size:12px;color:#64748b;padding:8px}
.nav-foot a{color:#94a3b8;cursor:pointer}
.btn-mine{background:#3730a3;color:#fff;margin-top:4px}
.btn-mine:hover{background:#4338ca}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar h2{font-size:17px;flex-shrink:0}
.search{flex:1;max-width:340px;position:relative}
.search input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:9px;background:var(--bg)}
.search:before{content:"🔍";position:absolute;left:10px;top:8px;font-size:13px;opacity:.6}
.topbar .who{font-size:13px;color:var(--muted)}
.btn{padding:9px 14px;border-radius:9px;font-weight:600}
.btn.primary{background:var(--primary);color:#fff}
.btn.ghost{background:var(--bg);border:1px solid var(--line);color:var(--txt)}
.content{padding:20px 22px;flex:1;overflow:auto}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chip{padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:500;color:var(--muted)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip.money.on{background:var(--green);border-color:var(--green)}
select.fsel,input.fsel,button.fsel{height:38px;padding:0 12px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13px;font-weight:500;color:var(--txt);transition:border-color .12s,box-shadow .12s}
select.fsel{padding-right:8px}
select.fsel:hover,input.fsel:hover,button.fsel:hover{border-color:#cbd5e1}
select.fsel:focus,input.fsel:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.chip{height:36px;display:inline-flex;align-items:center;transition:border-color .12s,background .12s,color .12s;cursor:pointer}
.chip:hover{border-color:#cbd5e1}
.chip.on:hover{border-color:var(--primary)}
/* visões salvas (filtros favoritos) */
.savedviews{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:2px 0 14px}
.sv-lab{font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--muted)}
.sv-empty{font-size:12.5px;color:#94a3b8;font-style:italic}
.sv-chip{display:inline-flex;align-items:center;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;overflow:hidden;height:32px}
.sv-apply{padding:0 4px 0 12px;height:100%;font-size:12.5px;font-weight:600;color:#1d4ed8;background:none}
.sv-apply:hover{color:#1e3a8a}
.sv-del{padding:0 9px 0 5px;height:100%;font-size:15px;color:#93c5fd;background:none;line-height:1}
.sv-del:hover{color:var(--red)}
.sv-save{height:32px;padding:0 13px;border:1px dashed #cbd5e1;border-radius:20px;background:#fff;font-size:12.5px;font-weight:600;color:var(--muted);transition:border-color .12s,color .12s}
.sv-save:hover{border-color:var(--primary);color:var(--primary)}

/* table */
.tablewrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow-x:auto;overflow-y:visible}
table{width:100%;border-collapse:collapse;min-width:760px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--line);background:#f8fafc}
td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row:hover{background:#f8fafc;cursor:pointer}
tr.row.sel{background:#eff6ff}
.lead-cell{display:flex;align-items:center;gap:10px;min-width:0}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.lead-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-cargo{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.renda{font-weight:700;font-size:13px}
.renda.hi{color:var(--green)} .renda.lo{color:#94a3b8}
.statusbadge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;border:none;cursor:pointer;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-table td:nth-child(4),.ct-table th:nth-child(4){text-align:right;white-space:nowrap}
.ct-table td:nth-child(8),.ct-table th:nth-child(8){text-align:center}
.ct-table tr.row td{transition:background .1s}
/* lista tipo planilha (Sheets) */
.sheet-hint{font-size:11.5px;color:#94a3b8;margin:-2px 0 8px}
.tablewrap.sheet{background:#fff;border:1px solid var(--line);border-radius:12px;overflow-x:auto}
.sheet-table{table-layout:fixed;border-collapse:collapse;min-width:100%}
.sheet-table td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;overflow:hidden;word-break:break-word}
.sheet-table tbody tr:last-child td{border-bottom:none}
.sheet-table th{padding:0;border-bottom:1px solid var(--line);background:#f8fafc;position:relative}
.sheet-th{cursor:grab;white-space:nowrap}
.sheet-th .th-label{display:inline-block;padding:11px 4px 11px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;cursor:pointer}
.sheet-th .th-ar{font-size:10px;opacity:.6;margin-left:3px}
.sheet-th .th-filt{cursor:pointer;font-size:11px;padding:0 4px}
.sheet-th.th-over{background:#dbeafe;box-shadow:inset 3px 0 0 var(--primary)}
.sheet-th.th-dragging{opacity:.45}
.col-resizer{position:absolute;right:0;top:0;height:100%;width:8px;cursor:col-resize;z-index:3}
.col-resizer:hover{background:linear-gradient(90deg,transparent,rgba(37,99,235,.35))}
.colpick-th{padding:0;text-align:center;background:#f8fafc}
.colpick-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:16px;font-weight:700;line-height:1;cursor:pointer}
.colpick-btn:hover{border-color:var(--primary);color:var(--primary)}
.sheet-table .checkcol{text-align:center}
.sheet-table .ct-ell{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:normal;line-height:1.3}
.sheet-table .lead-cell{align-items:center}
.sheet-table .lead-name{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.25}
.sheet-table .lead-cargo{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.2}
/* módulo Tarefas */
.tk-wrap{max-width:760px}
.tk-compose{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tk-compose #tk-input{flex:1;min-width:220px;height:42px;padding:0 14px;border:1px solid var(--line);border-radius:10px;font-size:14px}
.tk-compose #tk-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.tk-compose #tk-date{height:42px;padding:0 10px;border:1px solid var(--line);border-radius:10px;font-size:13px;color:var(--muted)}
.tk-compose .btn.primary{height:42px;display:inline-flex;align-items:center}
.tk-sec{margin-bottom:20px}
.tk-sec-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px}
.tk-clear{margin-left:auto;font-size:12px;font-weight:600;color:#94a3b8;background:none;text-decoration:underline;cursor:pointer}
.tk-clear:hover{color:var(--red)}
.tk-row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:box-shadow .12s}
.tk-row:hover{box-shadow:0 4px 14px rgba(15,23,42,.07)}
.tk-row.done{opacity:.62}
.tk-check{width:24px;height:24px;border-radius:50%;border:2px solid #cbd5e1;background:#fff;font-size:13px;font-weight:800;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.tk-check.on{background:var(--green);border-color:var(--green);color:#fff}
.tk-check:hover{border-color:var(--green)}
.tk-main{flex:1;min-width:0}
.tk-text{font-size:14px;font-weight:500;color:var(--txt);word-break:break-word}
.tk-row.done .tk-text{text-decoration:line-through}
.tk-due{display:inline-block;margin-top:4px;font-size:11px;font-weight:700;color:#0f766e;background:#f0fdfa;border:1px solid #99f6e4;border-radius:20px;padding:2px 8px}
.tk-due.soon{color:#9a3412;background:#fff7ed;border-color:#fdba74}
.tk-due.over{color:#b91c1c;background:#fef2f2;border-color:#fecaca}
.tk-del{background:none;font-size:15px;opacity:.4;flex-shrink:0;cursor:pointer}
.tk-del:hover{opacity:1}
.tk-empty{color:#94a3b8;font-size:13.5px;padding:8px 2px}
/* menu de status (inline) redesenhado */
.stmenu{padding:0;width:250px;overflow:hidden}
.stmenu-h{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt);font-weight:600}
.stmenu-h .stmenu-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
.stmenu-body{padding:6px;max-height:260px;overflow:auto}
.stmenu-others{padding:4px 6px 6px;max-height:240px;overflow:auto;border-top:1px solid var(--line)}
.stmenu .smi{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px}
.stmenu .smi:hover{background:var(--bg)}
.stmenu .smi.on{background:#eff6ff;font-weight:600}
.smi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.smi-t{flex:1;min-width:0}
.smi-ck{color:var(--primary);font-weight:800}
.smi-grp{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;padding:8px 8px 3px}
.smi-empty{padding:10px;color:var(--muted);font-size:12.5px}
.stmenu-more{width:100%;text-align:left;padding:9px 14px;border-top:1px solid var(--line);background:#f8fafc;font-size:12.5px;font-weight:600;color:var(--primary);cursor:pointer}
.stmenu-more:hover{background:#eff6ff}
/* cards de minerados (quebra de texto + campos ricos) */
.mc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:box-shadow .12s,border-color .12s}
.mc:hover{border-color:#cbd5e1;box-shadow:0 4px 14px rgba(15,23,42,.07)}
.mc-head{display:flex;align-items:center;gap:11px}
.mc-id{flex:1;min-width:0}
.mc-nm{font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.25}
.mc-date{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35;word-break:break-word}
.mc-act{display:flex;gap:6px;flex-shrink:0}
.mc-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.mc-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#475569;background:#f1f5f9;border-radius:8px;padding:4px 9px;line-height:1.3;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-chip.date{color:#94a3b8;background:#f8fafc}
/* Inbox redesenhada */
.ibx-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:12px}
.ibx-head .btn.primary{white-space:nowrap;flex-shrink:0;padding:9px 15px}
.ibx-sync-hint{font-size:12.5px;color:var(--muted);flex:1;min-width:200px}
.ibx-how-wrap{margin-left:auto}
.ibx-how{font-size:12px;font-weight:600;color:var(--primary);cursor:pointer;list-style:none;white-space:nowrap}
.ibx-how::-webkit-details-marker{display:none}
.ibx-how-wrap[open]{flex-basis:100%;margin-left:0}
.ibx-steps{font-size:12px;color:var(--muted);background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px;line-height:1.6}
.ibx-sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ibx-prev{font-size:12.5px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
.ibx-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.itag{font-size:10.5px;font-weight:700;border-radius:20px;padding:2px 8px;white-space:nowrap}
.itag.cat{background:#eef2ff;color:#4338ca}
.itag.resp{background:#dcfce7;color:#15803d}
.itag.tel{background:#e0edff;color:#1d4ed8}
.itag.unread{background:#fef2f2;color:#dc2626}
.itag.hot{background:#fff7ed;color:#c2410c}
.itag.cool{background:#fef2f2;color:#b91c1c}
.itag.time{background:#f1f5f9;color:#64748b}
.mc-chip.money{background:#dcfce7;color:#15803d}
.mc-chip.money.lo{background:#f1f5f9;color:#64748b}
.mc-chip.edu{background:#eef2ff;color:#4338ca}
.mc-chip.edu.pend{background:#fff;border:1px dashed #cbd5e1;color:#94a3b8;font-weight:500}
.mc-chip.pend{background:#fff;border:1px dashed #cbd5e1;color:#94a3b8;font-weight:500}
.statusbadge .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85)}
.score{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px}
.flag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;background:#fef2f2;color:var(--red);margin-left:4px}
.flag.warn{background:#fffbeb;color:var(--amber)}
.muted{color:var(--muted)}
.due{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:#fef2f2;color:var(--red)}
.due.soon{background:#fffbeb;color:var(--amber)}
.due.ok{background:#f0fdf4;color:var(--green)}
.cbx{width:17px;height:17px;cursor:pointer;accent-color:var(--primary)}
.star{font-size:15px;line-height:1;color:#cbd5e1;background:none;padding:0}
.star.on{color:var(--amber)}

/* funil */
.funil{display:flex;flex-wrap:nowrap;align-items:flex-start;gap:14px;overflow-x:auto;overflow-y:hidden;padding-bottom:12px}
.col{background:#fff;border:1px solid var(--line);border-radius:12px;min-width:250px;width:250px;flex:0 0 250px;display:flex;flex-direction:column;max-height:calc(100vh - 250px)}
.col h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.col .count{background:var(--bg);color:var(--muted);border-radius:10px;padding:1px 8px;font-size:11px}
.col .cards{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}
.col.drop{outline:2px dashed var(--primary);outline-offset:-4px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;cursor:grab;box-shadow:0 1px 2px rgba(15,23,42,.05);transition:box-shadow .14s,border-color .14s,transform .14s}
.kcard:hover{border-color:#cbd5e1;box-shadow:0 8px 20px rgba(15,23,42,.10);transform:translateY(-1px)}
.kcard.dragging{opacity:.4}
.kcard .top{display:flex;gap:8px;align-items:center}
.kcard .nm{font-weight:600;font-size:13px;display:flex;align-items:center;gap:4px}
.kcard .emp{font-size:11px;color:var(--muted)}
.kcard .meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.kcard .kacts{display:flex;gap:4px;margin-top:10px;border-top:1px solid #f1f5f9;padding-top:9px}
/* card de lead redesenhado (cardCore) */
.cc-head{display:flex;gap:10px;align-items:center}
.cc-id{min-width:0;flex:1}
.cc-nm{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.cc-role{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.cc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.cc-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#475569;background:#f1f5f9;border-radius:7px;padding:3px 8px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.cc-chip.money{background:#dcfce7;color:#15803d}
.cc-chip.money.lo{background:#f1f5f9;color:#64748b}
.cc-chip.tel{background:#e0edff;color:#1d4ed8}

/* meu dia */
.daytop{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;margin-bottom:16px}
.hello{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border-radius:14px;padding:16px 18px;flex:1;min-width:260px;display:flex;flex-direction:column;justify-content:center}
.hello h3{font-size:18px;margin-bottom:2px}
.hello p{font-size:13px;opacity:.85}
.ringcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;min-width:200px}
.ringcard .rl{font-size:12px;color:var(--muted)}.ringcard .rb{font-size:13px;font-weight:700;margin-top:2px}
.statgrid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:130px;flex:1}
.stat .n{font-size:24px;font-weight:800}
.stat .l{font-size:12px;color:var(--muted)}
.metacard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;flex:2;min-width:300px}
.meta-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.meta-t{font-weight:700;font-size:13px}
.periodchips{display:flex;gap:5px;margin-left:auto}
.pchip{padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
.pchip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.cog{border:1px solid var(--line);border-radius:7px;background:#fff;padding:4px 8px;font-size:13px;cursor:pointer}
.period-range{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:10px}
.period-range input{padding:4px 7px;border:1px solid var(--line);border-radius:7px}
.bar-row{margin-bottom:10px}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:4px}
.bar-nome{font-weight:600}.bar-nums{font-weight:800}.bar-nums small{color:var(--muted);font-weight:600}
.bar-track{height:11px;background:#eef2f7;border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;transition:width .35s}
.meta-foot{font-size:11px;color:var(--muted);margin-top:2px}
.qualbar{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;margin-bottom:12px}
.qtags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.qtag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;background:#eef2f7;color:#475569}
.qtag.money{background:#dcfce7;color:#166534}
.qtag.date{background:#e0e7ff;color:#3730a3}
.qtable{width:100%;border-collapse:collapse;font-size:12.5px}
.qtable td{padding:7px 8px;border-bottom:1px solid var(--line)}
.qtable tr{cursor:pointer}
.qtable tr:hover{background:var(--bg)}
.qtable .qt-n{font-weight:700}
.qtable .qt-a{text-align:right;white-space:nowrap}
.daygrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.qsection{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.qhead{display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px}
.qhead .dotc{width:9px;height:9px;border-radius:50%}
.qhead .badge{margin-left:auto;background:var(--bg);color:var(--muted);border-radius:20px;padding:1px 9px;font-size:12px;font-weight:700}
.qbody{padding:6px;display:flex;flex-direction:column;gap:2px;max-height:380px;overflow:auto}
.qrow{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer}
.qrow:hover{background:#f8fafc}
.qmain{flex:1;min-width:0}
.qn{font-weight:600;font-size:13px;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qsub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qact{display:flex;gap:4px;flex-shrink:0}
.qbtn{padding:5px 9px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap}
.qbtn:hover{border-color:var(--primary);color:var(--primary)}
.qbtn.green:hover{border-color:var(--green);color:var(--green)}
.qbtn.amber:hover{border-color:var(--amber);color:var(--amber)}
.qempty{padding:18px;text-align:center;color:#94a3b8;font-size:13px}
.lkboard{display:flex;flex-wrap:nowrap;align-items:flex-start;gap:12px;overflow-x:auto;overflow-y:hidden;padding-bottom:12px}
.lkscope{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
/* segmented toggle */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.seg button{padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--primary);color:#fff}
/* acting-as banner */
.actbanner{background:#fef3c7;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.actbanner button{margin-left:auto;background:#92400e;color:#fff;padding:6px 11px;border-radius:8px;font-size:12px;font-weight:700}
/* profile chip (sidebar) */
.pchip{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;background:var(--navy2);color:#e2e8f0;width:100%;text-align:left;margin-bottom:8px}
.pchip:hover{background:#334155}
.pchip .pav{width:28px;height:28px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff}
.pchip .pn{font-weight:700;font-size:13px}
.pchip .pr{font-size:11px;color:#94a3b8}
/* perfil */
.profcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.profcard .bigav{width:60px;height:60px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff}
.metricgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.metric{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.metric .mn{font-size:26px;font-weight:800}
.metric .ml{font-size:12px;color:var(--muted);margin-top:2px}
.dstuck{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:#f1f5f9;color:var(--muted)}
.dstuck.warn{background:#fffbeb;color:var(--amber)}
.dstuck.bad{background:#fef2f2;color:var(--red)}

/* drawer */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;display:flex;justify-content:flex-end}
.drawer{width:460px;max-width:94vw;background:#fff;height:100%;overflow-y:auto;padding:22px;animation:slidein .18s ease}
@keyframes slidein{from{transform:translateX(30px);opacity:.5}to{transform:none;opacity:1}}
.drawer .dh{display:flex;gap:12px;align-items:center;margin-bottom:8px}
.drawer h2{font-size:18px}
.field{margin-top:12px}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px}
.row2{display:flex;gap:10px}.row2>div{flex:1}
.minichips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.minichip{padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--muted)}
.minichip:hover{border-color:var(--primary);color:var(--primary)}
.acompbox{margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:9px;background:#f8fafc;font-size:13px;font-weight:600}
.timeline{margin-top:8px;border-left:2px solid var(--line);padding-left:14px}
.tl-item{margin-bottom:12px;position:relative}
.tl-item:before{content:"";position:absolute;left:-21px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--primary)}
.tl-when{font-size:11px;color:var(--muted)}
.x{margin-left:auto;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}

/* modal */
.modal{background:#fff;border-radius:14px;width:480px;max-width:94vw;padding:24px;margin:auto}
.modal h2{font-size:18px;margin-bottom:4px}
.modal .hint{color:var(--muted);font-size:13px;margin-bottom:14px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;z-index:80;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.scard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 16px;min-width:120px}
.scard .n{font-size:22px;font-weight:800}
.scard .l{font-size:12px;color:var(--muted)}

/* bulk bar */
.bulkbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;border-radius:14px;padding:10px 12px;display:flex;align-items:center;gap:7px;box-shadow:0 12px 40px rgba(0,0,0,.32);z-index:55;flex-wrap:wrap;max-width:96vw}
.bulkbar b{padding:0 4px}
.bbtn{padding:7px 10px;border-radius:9px;background:#1e293b;color:#fff;font-size:12px;font-weight:600;border:1px solid #334155}
.bbtn:hover{background:#334155}
.bbtn.red{background:#7f1d1d;border-color:#991b1b}
.bbtn.red:hover{background:#991b1b}

.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45}
.sb-backdrop.on{display:block}
/* Inbox 2 colunas (lista ↔ detalhe) */
.ibx2{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:14px;align-items:start}
.ibx-list{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;max-height:76vh;overflow-y:auto}
.ibx-list .qrow{border-bottom:1px solid #f1f5f9;border-radius:0;padding:12px 14px;transition:background .12s;align-items:flex-start}
.ibx-list .qrow:last-child{border-bottom:none}
.ibx-list .qrow:hover{background:#f3f6fb}
.ibx-list .qrow.sel{background:#eaf3ff;box-shadow:inset 3px 0 0 var(--lk)}
.ibx-detail{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;min-height:280px;max-height:76vh;overflow-y:auto}
.ibx-bubble{background:#f1f5f9;border-radius:12px;padding:10px 12px;color:#334155;font-size:13px;margin:10px 0;line-height:1.45}
/* histórico completo do thread (Fase 2) */
.ibx-thread{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding:12px;margin:10px 0;background:#f8fafc;border:1px solid var(--line);border-radius:12px}
.ibx-msg{max-width:86%;padding:8px 12px;border-radius:14px;font-size:13.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
.ibx-msg .w{display:block;font-size:10px;opacity:.6;margin-top:3px}
.ibx-msg.them{align-self:flex-start;background:#fff;border:1px solid #e2e8f0;color:#0f172a;border-bottom-left-radius:4px}
.ibx-msg.me{align-self:flex-end;background:#dbeafe;color:#1e3a5f;border-bottom-right-radius:4px}
.ibx-back{display:none}
@media(max-width:760px){
  .ibx2{grid-template-columns:1fr}
  .ibx2 .ibx-detail{display:none}
  .ibx2.show-detail .ibx-list{display:none}
  .ibx2.show-detail .ibx-detail{display:block}
  .ibx2.show-detail .ibx-back{display:inline-block}
}
@media(max-width:760px){
  .sidebar{position:fixed;left:-260px;width:240px;z-index:50;transition:left .2s;box-shadow:2px 0 16px rgba(0,0,0,.3)}
  .sidebar.open{left:0}
  .menu-btn{display:inline-flex!important;align-items:center;justify-content:center}
  .topbar{padding:12px 14px;gap:8px}
  .topbar h2{display:none}
  .search{max-width:none}
  .content{padding:14px 12px}
  #top-novo{flex-shrink:0;padding:9px 11px}
  .daygrid{grid-template-columns:1fr}
  .tablewrap{overflow-x:auto}
  .statgrid .stat{min-width:46%}
  .daytop .hello,.daytop .ringcard{min-width:100%}
}
.menu-btn{display:none}

/* ===== v1.18 · processo LinkedIn · gamificação · permissões ===== */
.nav-sec .ic.in{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;font-size:10px;background:var(--lk);color:#fff;border-radius:3px;font-weight:800}
.nav-item.step .stepn{width:19px;height:19px;border-radius:50%;background:#334155;color:#cbd5e1;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-item.step.active .stepn{background:#fff;color:var(--primary)}
.nav-item.step .ic{margin-left:-2px}

/* Mineração / gamificação */
.minecard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:14px}
.minecard.live{background:linear-gradient(135deg,#312e81,#4338ca);color:#fff;border:none;box-shadow:0 14px 44px rgba(67,56,202,.32)}
.mine-live-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.mine-caps{font-size:46px;font-weight:800;line-height:1}
.mine-cap-l{font-size:12px;opacity:.85;margin-top:3px}
.mine-clock-wrap{text-align:right}
.mine-clock{font-size:40px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.mine-progbar{height:8px;background:rgba(255,255,255,.25);border-radius:6px;margin-top:14px;overflow:hidden}
.mine-prog{height:100%;background:#fff;border-radius:6px;transition:width .5s linear}
.mine-acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.minecard.live .btn.ghost{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff}
.minecard.live #mine-stop{margin-left:auto;background:rgba(255,255,255,.95);color:#dc2626;border-color:transparent}
.mine-times{display:flex;gap:10px;flex-wrap:wrap}
.mine-time{width:84px;height:84px;border-radius:16px;border:2px solid var(--line);background:#fff;font-size:26px;font-weight:800;color:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .12s,box-shadow .12s,border-color .12s}
.mine-time span{font-size:11px;font-weight:600;color:var(--muted);margin-top:2px}
.mine-time:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 22px rgba(37,99,235,.18)}
.mine-time.alt{color:var(--violet)}
.minetools{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:4px}

/* Agenda strip */
.agstrip{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:16px}
.agstrip-h{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px}
.agstrip-row{display:flex;gap:8px;flex-wrap:wrap}
.agchip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;background:#f0fdfa;border:1px solid #99f6e4;color:#0f766e;font-size:12.5px;font-weight:600;text-decoration:none}
.agchip:hover{background:#ccfbf1}

/* Usuários & permissões */
.usergrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.usercard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
.userhead{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.usercard .bigav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
.perms{display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--line);padding-top:12px}
.permtog{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:var(--txt);cursor:pointer}

/* ---------- v1.25: VISÃO GERAL ---------- */
.vg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-top:14px}
.vg-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.vg-card h3{font-size:13.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.vg-card h3 .badge{margin-left:auto}
.vg-wide{grid-column:1/-1}
.funrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;border-radius:8px;padding:3px 6px}
.funrow:hover{background:var(--bg)}
.funrow .fl{width:104px;font-size:12.5px;font-weight:600;color:var(--muted);flex-shrink:0;text-align:right}
.funrow .ftrack{flex:1;background:var(--bg);border-radius:99px;height:18px;overflow:hidden}
.funrow .ffill{height:100%;border-radius:99px;min-width:2px;transition:width .4s}
.funrow .fn{width:56px;font-weight:800;font-size:13px;flex-shrink:0}
.funrow .fp{font-size:11px;color:var(--muted)}
.vg-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.vg-kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.vg-kpi .n{font-size:24px;font-weight:800}
.vg-kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
.vg-kpi .s{font-size:11px;color:var(--muted)}
.sparkwrap{display:flex;align-items:flex-end;gap:3px;height:74px;margin-top:6px}
.sparkcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;height:100%}
.sparkbar{border-radius:3px 3px 0 0;min-height:2px}
.sparklbl{font-size:9px;color:var(--muted);text-align:center;margin-top:3px}
.vg-list .qrow{padding:7px 8px}
.vg-empty{color:var(--muted);font-size:13px;padding:14px 4px}
/* ---------- v1.25: BUSCA GLOBAL ⌘K ---------- */
.cmdk-bd{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:90;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;backdrop-filter:blur(2px)}
.cmdk{background:var(--card);border-radius:16px;width:min(620px,92vw);box-shadow:0 24px 80px rgba(0,0,0,.35);overflow:hidden}
.cmdk input{width:100%;border:none;outline:none;padding:17px 18px;font-size:16px;border-bottom:1px solid var(--line)}
.cmdk-res{max-height:54vh;overflow:auto;padding:6px}
.cmdk-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer}
.cmdk-row.sel,.cmdk-row:hover{background:var(--bg)}
.cmdk-row .cm{flex:1;min-width:0}

let FUNIL_MODE='linkedin'; // Funil: 'linkedin' (processo, LK_FLOW) | 'completo' (todas as etapas, admin)
let APP_USERS=[];      // app_users (papel + permissões), carregado no boot
let ME_EMAIL='';       // e-mail logado (chave do app_users)
let MY_PERMS=null;     // permissões efetivas do papel em foco
let MINING=null;       // sessão de mineração ativa: {inicioISO, metaSeg, baseISO}
let MINING_TICK=null;  // setInterval do cronômetro
// papel efetivo = real Victor OU admin escolhendo ver como Victor
function syncProfile(){ IS_VICTOR = REAL_VICTOR || ACT_AS==='Victor'; MY_NAME = IS_VICTOR?'Victor':'Gustavo'; MY_PERMS = effectivePerms(); }
function isAdmin(){ return !REAL_VICTOR; }
function uiAdmin(){ return isAdmin() && ACT_AS!=='Victor'; } // admin real E fora da pré-visualização "ver como Victor"
// ===== PERMISSÕES =====
const DEFAULT_PERMS = {admin:{papel:'admin',ver_apenas_meus:false,pode_minerar:true,pode_importar:true,pode_relatorio:true,pode_duplicatas:true},
  assistente:{papel:'assistente',ver_apenas_meus:true,pode_minerar:true,pode_importar:false,pode_relatorio:true,pode_duplicatas:false}};
function permsByEmail(email){ return APP_USERS.find(u=>(u.email||'').toLowerCase()===(email||'').toLowerCase())||null; }
// permissões do papel atualmente EM FOCO (respeita "ver como Victor")
function effectivePerms(){
  if(IS_VICTOR){
    // assistente em foco: usa a linha do assistente (se admin prevendo, pega a 1ª linha assistente)
    const row = REAL_VICTOR ? permsByEmail(ME_EMAIL) : APP_USERS.find(u=>u.papel==='assistente');
    return Object.assign({}, DEFAULT_PERMS.assistente, row||{});
  }
  return Object.assign({}, DEFAULT_PERMS.admin, permsByEmail(ME_EMAIL)||{});
}
function can(p){ return !!(MY_PERMS&&MY_PERMS[p]); }
// trava de visão: assistente com ver_apenas_meus só enxerga os próprios + os marcados pra acompanhar
function canSeeAll(){ return !(MY_PERMS&&MY_PERMS.ver_apenas_meus); }
function baseLeads(){ return canSeeAll()?LEADS:LEADS.filter(l=>l.responsavel===MY_NAME||l.acompanhar_victor); }
const SITUACOES=['Ativo','Dormente','Convertido','Descartado'];
function situacaoOf(l){
  if(l.etapa==='Descartado') return 'Descartado';
  if(l.etapa==='Dormente') return 'Dormente';
  if(l.status==='Convertido') return 'Convertido';
  return 'Ativo';
}

// ===== HELPERS =====
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// href seguro: só deixa passar protocolos navegáveis; bloqueia javascript:/data: etc. (evita XSS via href clicável)
const safeHref=u=>{const s=(u==null?'':String(u)).trim();return /^(https?:|mailto:|tel:)/i.test(s)?esc(s):'#';};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function initials(n){return (n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function avaColor(id){let h=0;for(const c of (id||''))h=(h*31+c.charCodeAt(0))%AVA_COLORS.length;return AVA_COLORS[h];}
function byId(id){return LEADS.find(l=>l.id===id);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){if(!s)return'';const [y,m,d]=s.slice(0,10).split('-');return d+'/'+m;}
function isOverdue(l){return l.data_proxima_acao && l.data_proxima_acao.slice(0,10) < todayStr();}
function isDueToday(l){return l.data_proxima_acao && l.data_proxima_acao.slice(0,10) === todayStr();}
function dueHTML(l){
  if(!l.data_proxima_acao)return'';
  const d=l.data_proxima_acao.slice(0,10);
  if(d<todayStr())return `<span class="due">⏰ ${fmtDate(d)}</span>`;
  if(d===todayStr())return `<span class="due soon">⏰ hoje</span>`;
  return `<span class="due ok">📅 ${fmtDate(d)}</span>`;
}
// fallback do avatar quando a foto falha: monta o <div> via DOM (sem interpolar nome em handler inline → evita XSS)
function avatarFail(img,s){
  const d=document.createElement('div');
  d.className='avatar'; d.style.cssText=`width:${s}px;height:${s}px;background:${img.dataset.col}`;
  d.textContent=img.dataset.init; img.replaceWith(d);
}
function avatarHTML(l,size){
  const s=size||36; const init=initials(l.nome), col=avaColor(l.id);
  if(l.foto_url) return `<img class="avatar" style="width:${s}px;height:${s}px" src="${esc(l.foto_url)}" data-init="${esc(init)}" data-col="${esc(col)}" onerror="avatarFail(this,${s})"/>`;
  return `<div class="avatar" style="width:${s}px;height:${s}px;background:${esc(col)}">${esc(init)}</div>`;
}
function rendaHTML(l){
  if(l.renda_estimada==null) return `<span class="muted">—</span>`;
  const hi=l.renda_estimada>=10000;
  return `<span class="renda ${hi?'hi':'lo'}">${l.renda_auto?'~':''}R$ ${Number(l.renda_estimada).toLocaleString('pt-BR')}</span>`;
}
// resumo do perfil que norteia a abordagem: cargo · empresa · renda (compacto, 1 linha)
function perfilResumo(l){
  const parts=[]; if(l.cargo)parts.push(esc(l.cargo)); if(l.empresa)parts.push(esc(l.empresa));
  const txt=parts.join(' · ');
  let renda='';
  if(l.renda_estimada!=null){ const hi=l.renda_estimada>=10000;
    renda=`<span class="renda ${hi?'hi':'lo'}" style="font-size:11px">${l.renda_auto?'~':''}R$ ${Number(l.renda_estimada).toLocaleString('pt-BR')}</span>`; }
  if(!txt&&!renda) return '';
  return `<div class="qsub" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#64748b;font-size:11px;margin-top:1px">${txt}${txt&&renda?' · ':''}${renda}</div>`;
}
function statusBadge(l){
  const c=ETAPA_COLOR[STATUS_ETAPA[l.status]]||'#64748b';
  return `<button class="statusbadge" style="background:${c}" data-status-btn="${l.id}"><span class="dot"></span>${esc(l.status)}</button>`;
}
function starBtn(l){return `<button class="star ${l.prioridade?'on':''}" data-star="${l.id}" title="Prioridade">${l.prioridade?'★':'☆'}</button>`;}
function flagsHTML(l){
  return (l.flags_qualidade||[]).map(f=>`<span class="flag ${f==='SEM_DDD'?'warn':''}">${esc(f)}</span>`).join('');
}
function normUrl(u){if(!u)return null;u=u.trim().toLowerCase().split('?')[0].split('#')[0].replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/overlay.*$/,'').replace(/\/details.*$/,'');if(!u.endsWith('/'))u+='/';return u;}
function normPhone(raw){if(!raw)return{telefone:null,e164:null};let d=raw.replace(/\D/g,'');if(d.startsWith('55')&&d.length>11)d=d.slice(2);if(d.length===11)return{telefone:`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`,e164:`+55${d}`};if(d.length===10)return{telefone:`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`,e164:`+55${d}`};return{telefone:raw,e164:null};}
function firstName(n){return (n||'').trim().split(' ')[0]||'';}
const MSG_TPL_DEFAULT=[
  {nome:'Recomendação (WhatsApp)',texto:'Me chamo Gustavo Jucá. Não nos conhecemos ainda. Quem me passou seu telefone foi {{recomendante}}. Ela me recomendou seu nome a respeito de uma oportunidade profissional. Posso retornar para passar mais detalhes?'},
  {nome:'Conexão LinkedIn',texto:'Olá {{primeiro_nome}}, tudo bem contigo? Encontrei seu perfil por meio de colegas que temos em comum. Acredito que pode haver sinergia em um projeto pelo qual sou responsável. Espero poder me conectar e evoluir essa conversa caso faça sentido para ambos.'}
];
function msgTemplates(){ return (MSG_TEMPLATES&&MSG_TEMPLATES.length)?MSG_TEMPLATES:MSG_TPL_DEFAULT; }
function fillTpl(txt,l){ return (txt||'').replace(/\{\{\s*primeiro_nome\s*\}\}/gi,firstName(l.nome)).replace(/\{\{\s*recomendante\s*\}\}/gi,l.recomendante||'').replace(/\{\{\s*nome\s*\}\}/gi,l.nome||''); }
function copyTplText(txt,l){ navigator.clipboard.writeText(fillTpl(txt,l)).then(()=>toast('Mensagem copiada — '+firstName(l.nome)),()=>toast('Não consegui copiar')); }
function copyMsg(l,anchor){
  const tpls=msgTemplates();
  if(tpls.length<=1){ copyTplText(tpls[0].texto,l); return; }
  closeMenus();
  const m=document.createElement('div'); m.className='statusmenu';
  m.style.cssText='position:fixed;z-index:80;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:6px;width:290px;max-height:360px;overflow:auto';
  m.innerHTML=`<div style="font-size:10px;text-transform:uppercase;color:var(--muted);padding:6px 8px 4px;font-weight:700">Escolha o modelo · ${esc(firstName(l.nome))}</div>`+tpls.map((t,i)=>`<div class="smi" data-i="${i}" style="padding:8px 9px;border-radius:7px;cursor:pointer"><div style="font-weight:600;font-size:13px">${esc(t.nome||('Modelo '+(i+1)))}</div><div class="muted" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(fillTpl(t.texto,l))}</div></div>`).join('');
  document.body.appendChild(m);
  if(anchor&&anchor.getBoundingClientRect){ const r=anchor.getBoundingClientRect(); m.style.top=Math.min(r.bottom+4,window.innerHeight-380)+'px'; m.style.left=Math.min(r.left,window.innerWidth-306)+'px'; }
  else { m.style.top='90px'; m.style.left=Math.max(8,(window.innerWidth-290)/2)+'px'; }
  m.querySelectorAll('.smi').forEach(it=>it.onclick=()=>{ const t=tpls[+it.dataset.i]; closeMenus(); copyTplText(t.texto,l); });
  setTimeout(()=>document.addEventListener('click',function away(e){ if(!m.contains(e.target)){ closeMenus(); document.removeEventListener('click',away,true); } },true),0);
}
function searchMatch(l){
  if(!SEARCH)return true;const q=SEARCH.toLowerCase();
  return [l.nome,l.empresa,l.cargo,l.recomendante].some(x=>(x||'').toLowerCase().includes(q));
}

// ===== DATA =====
async function loadLeads(){
  // v1.25: pagina de 1000 em 1000 (limite padrão do Supabase) — a base passou de 1000 leads no import de 10/06
  let all=[], from=0; const PAGE=1000;
  while(true){
    const {data,error}=await sb.from('leads').select('*').order('codigo',{ascending:true}).order('id',{ascending:true}).range(from,from+PAGE-1);
    if(error){toast('Erro ao carregar: '+error.message);return;}
    all=all.concat(data||[]);
    if(!data||data.length<PAGE)break;
    from+=PAGE;
  }
  LEADS=all;render();
}
async function loadSettings(){
  try{
    const {data}=await sb.from('app_settings').select('*');
    if(data) for(const r of data){
      if(r.chave==='meta_minerados_dia') SETTINGS.meta_minerados_dia=+r.valor||SETTINGS.meta_minerados_dia;
      if(r.chave==='meta_convites_dia')  SETTINGS.meta_convites_dia =+r.valor||SETTINGS.meta_convites_dia;
      if(r.chave==='msg_templates'){ try{ const a=JSON.parse(r.valor||'[]'); if(Array.isArray(a)&&a.length) MSG_TEMPLATES=a; }catch(_){} }
    }
  }catch(e){/* tabela ainda não criada → usa defaults */}
}
async function saveSetting(chave,valor){
  const {error}=await sb.from('app_settings').upsert({chave,valor,atualizado_em:new Date().toISOString()},{onConflict:'chave'});
  if(error){toast('Erro ao salvar meta: '+error.message);return false;}
  return true;
}
async function updateLead(id,patch){
  const _cur=LEADS.find(l=>l.id===id);
  // choke point de consistência: recalcula campos derivados da fonte em QUALQUER tela que salve
  if('nome' in patch && patch.nome) patch.primeiro_nome=firstName(patch.nome);
  if('linkedin_url' in patch && !('linkedin_url_norm' in patch)) patch.linkedin_url_norm=normUrl(patch.linkedin_url||'');
  if('telefone' in patch && !('telefone_e164' in patch)){ const _ph=normPhone(patch.telefone||''); patch.telefone=_ph.telefone; patch.telefone_e164=_ph.e164; }
  // régua de convites: carimba a data na 1ª vez que o lead vira "Convite Enviado"
  if(patch.status==='Convite Enviado' && _cur && !_cur.convite_enviado_em && !('convite_enviado_em' in patch)) patch.convite_enviado_em=new Date().toISOString();
  const {error}=await sb.from('leads').update(patch).eq('id',id);
  if(error){
    if(/acompanhar_victor|prioridade|column|schema cache/i.test(error.message))
      toast('Recurso novo: rode migration_v1_5.sql no Supabase pra liberar.');
    else toast('Erro: '+error.message);
    return false;
  }
  const i=LEADS.findIndex(l=>l.id===id);
  if(i>=0){Object.assign(LEADS[i],patch); if(patch.status) LEADS[i].etapa=STATUS_ETAPA[patch.status];}
  return true;
}

// ===== FILTERING (funil/lista) =====
function idadeInRange(a,key){
  a=a||0;
  if(key==='_29')  return a>0 && a<=29;
  if(key==='30_40')return a>=30 && a<=40;
  if(key==='41_')  return a>=41;
  return true;
}
function filtered(){
  let r=baseLeads();
  if(F_SITUACAO!=='Todos')r=r.filter(l=>situacaoOf(l)===F_SITUACAO);
  if(SEARCH)r=r.filter(searchMatch);
  if(F_ETAPA)r=r.filter(l=>l.etapa===F_ETAPA);
  if(F_STATUS)r=r.filter(l=>l.status===F_STATUS);
  if(F_EMPRESA.length)r=r.filter(l=>F_EMPRESA.includes(l.empresa));
  if(F_PROFISSAO)r=r.filter(l=>(l.cargo||'').toLowerCase().includes(F_PROFISSAO.toLowerCase()));
  if(F_SEGMENTO)r=r.filter(l=>(l.segmento||'')===F_SEGMENTO);
  if(F_IDADE)r=r.filter(l=>idadeInRange(l.faixa_idade,F_IDADE));
  if(F_SEXO)r=r.filter(l=>(l.sexo||'')===F_SEXO);
  if(F_MONEY)r=r.filter(l=>l.renda_estimada>=10000);
  if(F_PERIODO)r=r.filter(l=>periodMatch(l.criado_em,F_PERIODO));
  return r;
}

// ===== MEU DIA =====
function dayBase(){
  let r=baseLeads().filter(searchMatch);
  if(DAY_SCOPE==='me') r=r.filter(l=>l.responsavel===MY_NAME);
  return r;
}
function dayQueues(){
  const B=dayBase();
  const sortP=arr=>arr.slice().sort((a,b)=>(b.prioridade?1:0)-(a.prioridade?1:0));
  const Q=[];
  if(IS_VICTOR){
    Q.push({label:'Convites a enviar',color:'#2563eb',hint:'mande a conexão',

function ring(val,goal,color){
  const r=26,c=2*Math.PI*r,pct=Math.min(val/goal,1),off=c*(1-pct);
  return `<svg width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="7"/><circle cx="32" cy="32" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 32 32)"/><text x="32" y="37" text-anchor="middle" font-size="16" font-weight="800" fill="${color}">${val}</text></svg>`;
}
// ===== METAS / PERÍODO (Meu Dia) =====
function ymd(x){return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function workdays(ini,fim){let n=0,d=new Date(ini+'T00:00:00');const e=new Date(fim+'T00:00:00');while(d<=e){const w=d.getDay();if(w>=1&&w<=5)n++;d.setDate(d.getDate()+1);}return Math.max(1,n);}
function periodRange(){
  const now=new Date();
  if(PERIOD==='dia')  return {ini:todayStr(),fim:todayStr(),mult:1,label:'do dia'};
  if(PERIOD==='mes'){const i=new Date(now.getFullYear(),now.getMonth(),1),f=new Date(now.getFullYear(),now.getMonth()+1,0);return{ini:ymd(i),fim:ymd(f),mult:workdays(ymd(i),ymd(f)),label:'do mês'};}
  if(PERIOD==='periodo'&&PERIOD_RANGE&&PERIOD_RANGE.ini&&PERIOD_RANGE.fim)return{ini:PERIOD_RANGE.ini,fim:PERIOD_RANGE.fim,mult:workdays(PERIOD_RANGE.ini,PERIOD_RANGE.fim),label:'do período'};
  const dow=(now.getDay()+6)%7;const mon=new Date(now);mon.setDate(now.getDate()-dow);const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return {ini:ymd(mon),fim:ymd(sun),mult:5,label:'da semana'};
}
function inRange(d,r){if(!d)return false;const x=String(d).slice(0,10);return x>=r.ini&&x<=r.fim;}
function meuDiaScope(){return DAY_SCOPE==='me'?LEADS.filter(l=>l.responsavel===MY_NAME):baseLeads();}
function stcnt(){const ss=[...arguments];return meuDiaScope().filter(l=>ss.includes(l.status)).length;}
function barMeta(cur,goal,nome,color){
  const pct=goal>0?Math.min(Math.round(cur/goal*100),100):0;
  const hit=goal>0&&cur>=goal;
  return `<div class="bar-row"><div class="bar-top"><span class="bar-nome">${nome}</span><span class="bar-nums">${hit?'<span class="ok">✓ bateu! </span>':''}${cur}<small> / ${goal}</small></span></div>`+
    `<div class="bar-track"><div class="bar-fill" style="background:${hit?'var(--green)':color};width:${pct}%"></div></div></div>`;
}
function metasCardHTML(r){
  const goalM=SETTINGS.meta_minerados_dia*r.mult, goalC=SETTINGS.meta_convites_dia*r.mult;
  const curM=meuDiaScope().filter(l=>inRange(l.criado_em,r)).length;
  const curC=meuDiaScope().filter(l=>inRange(l.convite_enviado_em,r)).length;
  const chip=(p,t)=>`<button class="pchip ${PERIOD===p?'on':''}" data-period="${p}">${t}</button>`;
  const cog=!IS_VICTOR?`<button class="cog" id="meta-cog" title="Definir metas (admin)">⚙</button>`:'';
  const rangeRow=PERIOD==='periodo'?`<div class="period-range"><input type="date" id="pr-ini" value="${(PERIOD_RANGE&&PERIOD_RANGE.ini)||''}"> a <input type="date" id="pr-fim" value="${(PERIOD_RANGE&&PERIOD_RANGE.fim)||''}"> <button class="qbtn" id="pr-go">ver</button></div>`:'';
  return `<div class="metacard"><div class="meta-h"><span class="meta-t">🎯 Metas</span><div class="periodchips">${chip('dia','Dia')}${chip('semana','Semana')}${chip('mes','Mês')}${chip('periodo','Período')}</div>${cog}</div>`+
    rangeRow+barMeta(curM,goalM,'⛏ Minerados','#3730a3')+barMeta(curC,goalC,'🔗 Convites enviados','#0a66c2')+
    `<div class="meta-foot">metas/dia: ${SETTINGS.meta_minerados_dia} minerados · ${SETTINGS.meta_convites_dia} convites · janela ${r.label}</div></div>`;
}

async function doAct(b){
  const id=b.dataset.id,l=byId(id); if(!l)return;
  const act=b.dataset.act;
  if(act==='advance'){ if(await updateLead(id,{status:b.dataset.to})){toast(`${firstName(l.nome)} → ${b.dataset.to}`);render();} }
  else if(act==='msg'){ copyMsg(l); }
  else if(act==='call'){ const n=(l.tentativas_ligacao||0)+1; if(await updateLead(id,{tentativas_ligacao:n})){await sb.from('lead_events').insert({lead_id:id,tipo:'ligacao',texto:'Tentativa #'+n,usuario:ME});toast('Ligação registrada · '+firstName(l.nome));} }
  else if(act==='prox'){ const v=b.dataset.d==='clear'?null:(b.dataset.d==='0'?todayStr():addDays(+b.dataset.d)); if(await updateLead(id,{data_proxima_acao:v})){toast(v?('Próxima ação: '+fmtDate(v)):'Follow concluído');render();} }
  else if(act==='acomp'){ const nv=!l.acompanhar_victor; if(await updateLead(id,{acompanhar_victor:nv})){toast(nv?'Victor vai acompanhar':'Removido do Victor');render();} }
}

// ===== INBOX (controle de conversas) =====
function daysStuck(l){
  const d=l.data_status_atual||l.atualizado_em||l.criado_em; if(!d)return 0;
  return Math.max(0,Math.floor((Date.now()-new Date(d).getTime())/86400000));
}
function stuckBadge(n){const c=n>=3?'bad':n>=2?'warn':'';return `<span class="dstuck ${c}">${n}d parado</span>`;}
function inboxRow(l,acts){

      <div class="qsub">${esc(l.cargo||'—')}${l.empresa?' · '+esc(l.empresa):''}</div></div>
    <div class="qact">${acts}</div></div>`;
}
function normName(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ').trim();}
function respRow(l){
  const acts=`<button class="qbtn" data-act="msg" data-id="${l.id}">📩</button><button class="qbtn green" data-act="advance" data-to="Convite Aceito (c/ telefone)" data-id="${l.id}">📱 Tel</button><button class="qbtn amber" data-act="prox" data-d="1" data-id="${l.id}">+1d</button>`;
  return `<div class="qrow" data-open="${l.id}">${avatarHTML(l,34)}
    <div class="qmain"><div class="qn">${l.inbox_hot?'🔥 ':''}${starBtn(l)}${esc(l.nome)} ${l.inbox_nao_lida?'<span class="due">não lida</span>':''} <span class="dstuck">${esc(l.inbox_quando||'')}</span></div>
      <div class="qsub" style="color:#334155">"${esc(l.inbox_ultima_msg||'')}"</div></div>
    <div class="qact">${acts}</div></div>`;
}
function inboxCat(l){
  if(l.inbox_de_mim===false && l.inbox_ultima_msg) return 'resp';
  const s=l.status;
  if(s==='Convite Enviado') return 'enviado';
  if(s==='Convite Aceito (s/ telefone)') return 'semtel';
  if(s==='Convite Aceito (c/ telefone)') return 'tel';
  if(['Em Tentativa','Nao Atendeu','Retornar em outro momento'].includes(s)) return 'aguardando';
  return null;
}
function inboxActs(l){

  if(s==='Convite Aceito (s/ telefone)') return `<button class="qbtn" data-act="msg" data-id="${l.id}">📩</button><button class="qbtn green" data-act="advance" data-to="Convite Aceito (c/ telefone)" data-id="${l.id}">📱 Tel recebido</button><button class="qbtn amber" data-act="prox" data-d="2" data-id="${l.id}">+2d</button>`;
  if(s==='Convite Aceito (c/ telefone)') return `<button class="qbtn green" data-act="call" data-id="${l.id}">📞 +1</button><button class="qbtn" data-act="advance" data-to="${TA_PRIMEIRA}" data-id="${l.id}" title="Tem telefone → vira T.A.">🎯 1ª Abordagem</button>`;
  if(['Em Tentativa','Nao Atendeu','Retornar em outro momento'].includes(s)) return `<button class="qbtn green" data-act="call" data-id="${l.id}">📞 +1</button><button class="qbtn amber" data-act="prox" data-d="2" data-id="${l.id}">+2d</button>`;

function inboxHTML(){
  const skip=['Convertido','Dormente'];
  const B=baseLeads().filter(searchMatch)
    .filter(l=>DAY_SCOPE!=='me'||l.responsavel===MY_NAME)
    .filter(l=>!skip.includes(l.status)&&l.etapa!=='Descartado')
    .map(l=>({l,cat:inboxCat(l)})).filter(x=>x.cat);
  const all=B.map(x=>x.l);
  const cntCat=k=>B.filter(x=>x.cat===k).length;
  const total=all.length, respN=cntCat('resp'), semtelN=cntCat('semtel'), telN=cntCat('tel');
  const convStatus=['Convite Enviado','Convite Aceito (s/ telefone)','Convite Aceito (c/ telefone)','Em Tentativa','Nao Atendeu','Retornar em outro momento'];
  const esfriando=all.filter(l=>convStatus.includes(l.status)&&daysStuck(l)>=2).length;
  const quentes=all.filter(l=>l.inbox_hot).length;
  const lastSync=all.map(l=>l.inbox_sync).filter(Boolean).sort().slice(-1)[0];

  const cap=`<div class="ibx-head">
    <button class="btn primary" id="ibx-paste">🔄 Sincronizar do LinkedIn</button>
    <div class="ibx-sync-hint">Puxa conversas, fotos e históricos da sua extensão.${lastSync?` Última sincronização: <b>${new Date(lastSync).toLocaleString('pt-BR')}</b>.`:''}</div>
    <details class="ibx-how-wrap"><summary class="ibx-how">como funciona?</summary><div class="ibx-steps"><b>1.</b> No LinkedIn → <b>Mensagens</b>, clique em <b>Sincronizar tudo</b> (extensão). &nbsp;<b>2.</b> Volte aqui e clique em <b>Sincronizar do LinkedIn</b> — ele cola sozinho.</div></details>
  </div>`;

  const unreadN=all.filter(l=>l.inbox_nao_lida).length;
  const F=[['all','Todas',total],['resp','Responderam',respN],['enviado','Convite enviado',cntCat('enviado')],['semtel','Pedir telefone',semtelN],['tel','Telefone recebido',telN],['aguardando','Aguardando',cntCat('aguardando')],['unread','Não lidas',unreadN],['hot','Quentes',quentes],['cooling','Esfriando',esfriando]];
  const chips=`<div class="filters" style="margin-bottom:10px">`+F.map(([k,lb,n])=>`<button class="chip ${INBOX_FILTER===k?'on':''}" data-ibxf="${k}">${lb} <b style="opacity:.7">${n}</b></button>`).join('')
    +`<span style="flex:1"></span><button class="chip ${DAY_SCOPE==='me'?'on':''}" id="ib-me">Meus</button><button class="chip ${DAY_SCOPE==='all'?'on':''}" id="ib-all">Todos</button></div>`;

  const convStatus2=['Convite Enviado','Convite Aceito (s/ telefone)','Convite Aceito (c/ telefone)','Em Tentativa','Nao Atendeu','Retornar em outro momento'];
  let items;
  if(INBOX_FILTER==='all') items=B.map(x=>x.l);
  else if(INBOX_FILTER==='unread') items=B.filter(x=>x.l.inbox_nao_lida).map(x=>x.l);
  else if(INBOX_FILTER==='hot') items=B.filter(x=>x.l.inbox_hot).map(x=>x.l);
  else if(INBOX_FILTER==='cooling') items=B.filter(x=>convStatus2.includes(x.l.status)&&daysStuck(x.l)>=2).map(x=>x.l);
  else items=B.filter(x=>x.cat===INBOX_FILTER).map(x=>x.l);
  items.sort((a,b)=>{
    const p=l=>(l.inbox_de_mim===false&&l.inbox_ultima_msg?4:0)+(l.inbox_hot?2:0)+(l.inbox_nao_lida?1:0);
    const d=p(b)-p(a); return d!==0?d:daysStuck(b)-daysStuck(a);
  });
  // mantém a seleção; se sumiu do filtro, cai na primeira conversa (só pra preencher o painel no desktop)
  if(!items.some(l=>l.id===INBOX_SEL)) INBOX_SEL = items[0]?items[0].id:null;
  const selLead = items.find(l=>l.id===INBOX_SEL)||null;

  const list = items.length
    ? `<div class="ibx-list">${items.map(inboxSelRow).join('')}</div>`
    : '<div class="ibx-list"><div class="qempty" style="padding:30px;text-align:center">Nada nesse filtro ✓</div></div>';
  const two = `<div class="ibx2${INBOX_MOBILE_OPEN?' show-detail':''}">${list}${inboxDetailHTML(selLead)}</div>`;

  return kpis+cap+chips+two;

    const patch={inbox_ultima_msg:null,inbox_thread:null,inbox_thread_sync:null,inbox_nao_lida:false,inbox_hot:false,inbox_de_mim:null,inbox_quando:null,inbox_sync:null};

// ===== INGESTÃO DO HISTÓRICO DO THREAD (Fase 2) =====
async function ingestThread(l,payload){
  if(!payload||payload.tipo!=='thread'||!Array.isArray(payload.mensagens)||!payload.mensagens.length){
    toast('Isso não parece um histórico — use 📜 Captar conversa na extensão'); return false;
  }
  const msgs=payload.mensagens.map(m=>({de_mim:!!m.de_mim,texto:String(m.texto||'').slice(0,4000),quando:String(m.quando||'').slice(0,40)})).filter(m=>m.texto);
  if(!msgs.length){ toast('Histórico vazio'); return false; }
  const last=msgs[msgs.length-1];
  const patch={inbox_thread:msgs,inbox_thread_sync:new Date().toISOString(),
    inbox_ultima_msg:last.texto.slice(0,300),inbox_de_mim:last.de_mim,inbox_quando:last.quando||l.inbox_quando||null};
  if(await updateLead(l.id,patch)){ toast(`Conversa sincronizada · ${msgs.length} msgs`); render(); return true; }
  return false;
}

// ===== INGESTÃO DO INBOX (cola o JSON da extensão) =====
function openInboxPaste(){
  const ov=document.createElement('div');ov.className='overlay';ov.style.justifyContent='center';ov.style.alignItems='center';
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()" style="width:940px;max-width:96vw">
    <h2>🔄 Sincronizar do LinkedIn</h2>

    <div class="field"><label>Conversas copiadas (cola aqui se não vier sozinho)</label><textarea id="ibp-raw" rows="2" placeholder='cole aqui (Cmd/Ctrl+V)'></textarea></div>
    <div id="ibp-sum"></div>
    <div id="ibp-table" style="max-height:46vh;overflow:auto;margin-top:8px"></div>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
      <button class="btn primary" id="ibp-go" disabled>Aprovar e sincronizar</button>
      <button class="btn ghost" id="ibp-close">Fechar</button>
      <span id="ibp-msg" class="muted" style="font-size:12px"></span>
    </div>
  </div>`;
  ov.onclick=()=>ov.remove();document.body.appendChild(ov);
  $('#ibp-close').onclick=()=>ov.remove();
  const byName=new Map(); LEADS.forEach(l=>{const k=normName(l.nome); if(!byName.has(k))byName.set(k,l);});
  const extractPhone=t=>{const m=(t||'').match(/\(?\d{2}\)?\s?9?\d{4}[-.\s]?\d{4}/); return m?m[0]:'';};
  const statusOpts=sel=>ALL_STATUS.map(s=>`<option ${s===sel?'selected':''}>${esc(s)}</option>`).join('');
  const statusOptsG=sel=>ETAPAS.map(e=>`<optgroup label="${esc(ETAPA_LABEL[e]||e)}">`+STATUS_BY_ETAPA[e].map(s=>`<option ${s===sel?'selected':''}>${esc(s)}</option>`).join('')+`</optgroup>`).join('');
  let rows=[]; let PARSED_THREADS=null;
  function build(conv){
    rows=conv.map(c=>{
      const l=byName.get(normName(c.nome))||null;
      const responded=c.de_mim===false;
      const newPhone=extractPhone(c.ultima_msg);
      const phone=newPhone||(l&&l.telefone)||'';
      let status;
      if(l){ if(responded&&newPhone) status='1a Abordagem';
        else if(responded&&l.status==='Convite Enviado') status='Convite Aceito (s/ telefone)';
        else status=l.status; }
      else { if(newPhone) status='Convite Aceito (c/ telefone)';
        else if(responded) status='Convite Aceito (s/ telefone)';
        else status='Aguardando Qualificacao'; }
      return {c,l,action:l?'atualizar':'criar',status,phone,resp:(l&&l.responsavel)||MY_NAME,include:true};
    });
    renderTable();
  }
  function renderTable(){
    const inc=rows.filter(r=>r.include);
    const novos=inc.filter(r=>r.action==='criar').length, upd=inc.filter(r=>r.action==='atualizar').length;
    $('#ibp-sum').innerHTML=`<div class="summary">
      <div class="scard"><div class="n">${rows.length}</div><div class="l">conversas</div></div>
      <div class="scard"><div class="n" style="color:var(--green)">${novos}</div><div class="l">criar novo</div></div>
      <div class="scard"><div class="n" style="color:var(--primary)">${upd}</div><div class="l">atualizar</div></div>
      <div class="scard"><div class="n" style="color:var(--amber)">${rows.filter(r=>r.c.hot).length}</div><div class="l">🔥 quentes</div></div>
    </div>`;
    const head=`<tr><th style="width:26px"></th><th>Lead</th><th>Conversa</th><th>Ação</th><th>Status</th><th>Telefone</th><th>Resp.</th></tr>`;
    const body=rows.map((r,i)=>`<tr style="${r.include?'':'opacity:.4'}">
      <td><input type="checkbox" class="cbx" data-chk="${i}" ${r.include?'checked':''}></td>
      <td><div class="lead-name">${r.c.hot?'🔥 ':''}${esc(r.c.nome)}</div>${r.l?'':'<span class="flag warn">novo</span>'}</td>
      <td style="max-width:230px"><div class="lead-cargo" style="white-space:normal">${r.c.de_mim===false?'<b style="color:#16a34a">respondeu:</b> ':''}"${esc((r.c.ultima_msg||'').slice(0,80))}"</div></td>
      <td><span class="due ${r.action==='criar'?'soon':'ok'}">${r.action}</span></td>
      <td><select class="fsel" data-st="${i}" style="max-width:175px">${statusOptsG(r.status)}</select></td>
      <td><input data-ph="${i}" value="${esc(r.phone)}" style="width:122px;padding:6px;border:1px solid var(--line);border-radius:7px"></td>
      <td><select class="fsel" data-rp="${i}"><option ${r.resp==='Gustavo'?'selected':''}>Gustavo</option><option ${r.resp==='Victor'?'selected':''}>Victor</option></select></td>
    </tr>`).join('');
    const bulk=`<div class="filters" style="margin:4px 0 8px;gap:8px;align-items:center;flex-wrap:wrap;background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:8px 10px">
      <button class="chip" data-ball="1">✓ Marcar todos</button>
      <button class="chip" data-bnone="1">Desmarcar todos</button>
      <span class="muted" style="font-size:12px">aplicar aos <b>${inc.length}</b> marcados →</span>
      <select class="fsel" data-bresp><option value="">Responsável…</option><option>Gustavo</option><option>Victor</option></select>
      <select class="fsel" data-bstatus style="max-width:210px"><option value="">Status (define a etapa)…</option>${statusOptsG('')}</select>
    </div>`;
    $('#ibp-table').innerHTML=bulk+`<div class="tablewrap"><table>${head}${body}</table></div>`;
    const bAll=$('#ibp-table [data-ball]'); if(bAll)bAll.onclick=()=>{rows.forEach(r=>r.include=true);renderTable();};
    const bNone=$('#ibp-table [data-bnone]'); if(bNone)bNone.onclick=()=>{rows.forEach(r=>r.include=false);renderTable();};
    const bR=$('#ibp-table [data-bresp]'); if(bR)bR.onchange=()=>{ if(bR.value){rows.forEach(r=>{if(r.include)r.resp=bR.value;});renderTable();} };
    const bS=$('#ibp-table [data-bstatus]'); if(bS)bS.onchange=()=>{ if(bS.value){rows.forEach(r=>{if(r.include)r.status=bS.value;});renderTable();} };
    $('#ibp-table').querySelectorAll('[data-chk]').forEach(b=>b.onchange=()=>{rows[+b.dataset.chk].include=b.checked;renderTable();});
    $('#ibp-table').querySelectorAll('[data-st]').forEach(s=>s.onchange=()=>{rows[+s.dataset.st].status=s.value;});
    $('#ibp-table').querySelectorAll('[data-ph]').forEach(s=>s.oninput=()=>{rows[+s.dataset.ph].phone=s.value;});
    $('#ibp-table').querySelectorAll('[data-rp]').forEach(s=>s.onchange=()=>{rows[+s.dataset.rp].resp=s.value;});
    $('#ibp-go').disabled=inc.length===0;
    $('#ibp-go').textContent=`Aprovar e sincronizar (${inc.length})`;
  }
  $('#ibp-raw').oninput=e=>{
    let conv=null; PARSED_THREADS=null;
    try{const j=JSON.parse(e.target.value.trim()); conv=Array.isArray(j)?j:j.conversas; if(Array.isArray(j.threads))PARSED_THREADS=j.threads;}catch(_){}
    if(!Array.isArray(conv)||!conv.length){ $('#ibp-sum').innerHTML='<p class="hint" style="color:var(--red)">Nada reconhecido — clique 🔄 Sincronizar tudo na extensão e cole de novo.</p>'; $('#ibp-table').innerHTML=''; $('#ibp-go').disabled=true; return; }
    build(conv.filter(c=>c&&c.nome));
  };
  $('#ibp-go').onclick=async()=>{
    const sel=rows.filter(r=>r.include); if(!sel.length)return;
    $('#ibp-go').disabled=true; $('#ibp-msg').textContent='Sincronizando…';
    const now=new Date().toISOString(); let criados=0,atualizados=0,erros=0;
    for(const r of sel){
      const ph=r.phone?normPhone(r.phone):{telefone:null,e164:null};
      const inbox={inbox_ultima_msg:(r.c.ultima_msg||'').slice(0,300),inbox_de_mim:!!r.c.de_mim,inbox_quando:r.c.quando||null,inbox_nao_lida:!!r.c.nao_lida,inbox_hot:!!r.c.hot,inbox_sync:now};
      if(r.action==='criar'){
        const rec=Object.assign({nome:r.c.nome,primeiro_nome:firstName(r.c.nome),status:r.status,responsavel:r.resp,origem:'LinkedIn'},inbox);
        if(ph.telefone){rec.telefone=ph.telefone;rec.telefone_e164=ph.e164;}
        if(r.c.foto)rec.foto_url=r.c.foto;                       // foto da lista do LinkedIn
        const {data,error}=await sb.from('leads').insert(rec).select().single();
        if(error){erros++;} else {LEADS.push(data);criados++;}
      }else{
        const patch=Object.assign({status:r.status},inbox);
        if(ph.telefone){patch.telefone=ph.telefone;patch.telefone_e164=ph.e164;}
        if(r.c.foto && !(r.l&&r.l.foto_url))patch.foto_url=r.c.foto;  // sync em massa: SÓ preenche quem está sem foto (não sobrescreve)
        if(await updateLead(r.l.id,patch))atualizados++; else erros++;
      }
    }
    // históricos completos (payload tipo:sync) — casa por nome e grava o thread
    let hist=0;
    if(Array.isArray(PARSED_THREADS)&&PARSED_THREADS.length){
      const map=new Map(); LEADS.forEach(l=>{const k=normName(l.nome); if(!map.has(k))map.set(k,l);});
      for(const t of PARSED_THREADS){
        if(!t||!Array.isArray(t.mensagens)||!t.mensagens.length)continue;
        const l=map.get(normName(t.contato||'')); if(!l)continue;
        const msgs=t.mensagens.map(m=>({de_mim:!!m.de_mim,texto:String(m.texto||'').slice(0,4000),quando:String(m.quando||'').slice(0,40)})).filter(m=>m.texto);
        if(!msgs.length)continue;
        const last=msgs[msgs.length-1];
        const patch={inbox_thread:msgs,inbox_thread_sync:now,inbox_ultima_msg:last.texto.slice(0,300),inbox_de_mim:last.de_mim,inbox_quando:last.quando||l.inbox_quando||null};
        if(await updateLead(l.id,patch))hist++;
      }
    }
    toast(`Sincronizado · ${criados} criados, ${atualizados} atualizados${hist?', '+hist+' históricos':''}${erros?', '+erros+' erro(s)':''}`);
    ov.remove(); render();
  };
  setTimeout(()=>$('#ibp-raw').focus(),50);
  if(navigator.clipboard&&navigator.clipboard.readText){
    navigator.clipboard.readText().then(txt=>{ if(txt&&/"tipo"\s*:\s*"(inbox|sync)"|"conversas"/.test(txt)){ const ta=$('#ibp-raw'); ta.value=txt; ta.dispatchEvent(new Event('input')); } }).catch(()=>{});
  }
}

// ===== FUNIL LINKEDIN (board do processo, LK_FLOW) =====
function lkBoardHTML(){
  const B=filtered();
  const hint=`<p class="hint" style="margin:-2px 0 12px;color:var(--muted)">Processo de captação no LinkedIn · arraste o card pra avançar. Pegou o telefone? Promova pra <b>🎯 1ª Abordagem (T.A.)</b> — daí o lead sai do LinkedIn.</p>`;
  const cols=LK_FLOW.map(col=>{
    const items=B.filter(l=>l.status===col.s).sort((a,b)=>(b.prioridade?1:0)-(a.prioridade?1:0));
    const next=nextStatus(col.s);
    return `<div class="col lkcol" data-status="${esc(col.s)}">
      <h3>${esc(col.l)} <span class="count">${items.length}</span></h3>
      <div class="cards">${items.map(l=>lkcard(l,next)).join('')||'<div class="qempty">—</div>'}</div>
    </div>`;
  }).join('');
  return hint+`<div class="lkboard">${cols}</div>`;
}
function nextStatus(s){const i=LK_FLOW.findIndex(c=>c.s===s);return i>=0&&i<LK_FLOW.length-1?LK_FLOW[i+1].s:null;}
// corpo rico do card (Pipe LinkedIn e Funil Captação): nome · cargo·empresa · status · idade·renda · bairro
function cardCore(l){
  const idade=l.faixa_idade?esc(l.faixa_idade)+'a':'';
  const hiRenda=l.renda_estimada>=10000;
  const rendaTxt=(l.renda_estimada!=null)?((l.renda_auto?'~':'')+'R$ '+Number(l.renda_estimada).toLocaleString('pt-BR')):'';
  const role=esc(l.cargo||'—')+(l.empresa?' · '+esc(l.empresa):'');
  const chips=[
    rendaTxt?`<span class="cc-chip money ${hiRenda?'':'lo'}">💰 ${rendaTxt}</span>`:'',
    l.telefone?`<span class="cc-chip tel" title="${esc(l.telefone)}">📱 ${esc(l.telefone)}</span>`:'',
    idade?`<span class="cc-chip">${idade}</span>`:'',
    `<span class="cc-chip">📍 ${esc(l.bairro||'—')}</span>`
  ].filter(Boolean).join('');
  return `<div class="cc-head">${avatarHTML(l,40)}<div class="cc-id">
      <div class="cc-nm">${starBtn(l)}${esc(l.nome)} ${flagsHTML(l)}</div>
      <div class="cc-role">${role}</div>
    </div></div>
    <div class="cc-tags">${statusBadge(l)} ${dueHTML(l)}</div>
    <div class="cc-meta">${chips}</div>`;
}
function lkcard(l,next){
  // último passo do LinkedIn (telefone na mão) → promove pra 1ª Abordagem (T.A.)
  let nextBtn = next?`<button class="qbtn green" data-act="advance" data-to="${esc(next)}" data-id="${l.id}">➜</button>`:'';
  if(l.status==='Convite Aceito (c/ telefone)') nextBtn=`<button class="qbtn green" data-act="advance" data-to="${TA_PRIMEIRA}" data-id="${l.id}" title="Tem telefone → vira T.A.">🎯 1ª Abordagem</button>`;
  const tel='';
  return `<div class="kcard" draggable="true" data-id="${l.id}" data-open="${l.id}">
    ${cardCore(l)}
    ${nextBtn?`<div class="kacts">${nextBtn}</div>`:''}
  </div>`;
}
function wireLinkedin(){
  let dragId=null;
  document.querySelectorAll('.lkboard .kcard').forEach(c=>{
    c.ondragstart=e=>{dragId=c.dataset.id;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
    c.ondragend=()=>{dragId=null;c.classList.remove('dragging');};
  });
  document.querySelectorAll('.lkcol').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add('drop');};
    col.ondragleave=()=>col.classList.remove('drop');
    col.ondrop=async e=>{e.preventDefault();col.classList.remove('drop');
      const ns=col.dataset.status,l=byId(dragId);
      if(!l||l.status===ns)return;
      if(await updateLead(l.id,{status:ns})){toast(`${firstName(l.nome)} → ${ns}`);render();}
    };
  });
}

let COL_ORDER=null, COL_HIDDEN=null, COL_W=null;
function colsInit(){
  if(COL_ORDER) return;
  let saved={}; try{ saved=JSON.parse(localStorage.getItem('crm-cols-v2')||'{}'); }catch(e){}
  const valid=SHEET_COLS.map(c=>c.key);

  COL_W=(saved.w&&typeof saved.w==='object')?saved.w:{};
}
function colsSave(){ try{ localStorage.setItem('crm-cols-v2',JSON.stringify({order:COL_ORDER,hidden:[...COL_HIDDEN],w:COL_W})); }catch(e){} }
function colsVisible(){ colsInit(); return COL_ORDER.filter(k=>!COL_HIDDEN.has(k)).map(k=>SHEET_BY_KEY[k]).filter(Boolean); }
function colsReset(){ colsInit(); COL_ORDER=SHEET_COLS.map(c=>c.key); COL_HIDDEN=new Set(SHEET_COLS.map(c=>c.key).filter(k=>!SHEET_DEFAULT_VISIBLE.includes(k))); COL_W={}; colsSave(); render(); }
function colMoveBefore(dragKey,targetKey){ colsInit(); if(dragKey===targetKey)return; const a=COL_ORDER.filter(k=>k!==dragKey); let i=targetKey?a.indexOf(targetKey):a.length; if(i<0)i=a.length; a.splice(i,0,dragKey); COL_ORDER=a; colsSave(); }

// ordena os dados da lista pela coluna ativa (vazios sempre no fim) — usabilidade de planilha
function sortData(arr){
  if(!SORT.col) return arr;
  const get=l=>COL_GET[SORT.col]?COL_GET[SORT.col](l):'';
  return [...arr].sort((a,b)=>{
    let x=get(a),y=get(b);
    const ex=(x==null||x===''),ey=(y==null||y==='');
    if(ex&&ey)return 0; if(ex)return 1; if(ey)return -1;
    if(SORT.col==='renda'||SORT.col==='idade') return ((+x||0)-(+y||0))*SORT.dir;
    return String(x).localeCompare(String(y),'pt',{numeric:true})*SORT.dir;
  });
}
function thSort(col,label){
  const on=SORT.col===col, ar=on?(SORT.dir>0?'▲':'▼'):'';

}
function thCellSheet(c){
  const on=SORT.col===c.sort, ar=on?(SORT.dir>0?'▲':'▼'):'';

    th.addEventListener('dragend',()=>{ dragCol=null; document.querySelectorAll('.sheet-th').forEach(x=>x.classList.remove('th-over','th-dragging')); });
    th.addEventListener('dragover',e=>{ e.preventDefault(); if(dragCol&&th.dataset.colkey!==dragCol)th.classList.add('th-over'); });

  });
  document.querySelectorAll('.col-resizer').forEach(rz=>{
    rz.onmousedown=e=>{
      e.preventDefault(); e.stopPropagation(); colsInit();

      const idx=[...th.parentNode.children].indexOf(th);

      const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.body.style.cursor=''; document.body.style.userSelect=''; colsSave(); render(); };

function funilHTML(){
  const data=filtered();
  const cols=ETAPAS.filter(e=>e!=='Descartado'||data.some(l=>l.etapa==='Descartado')).map(e=>{
    const items=data.filter(l=>l.etapa===e);
